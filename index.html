<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Path of Idle</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#090705}
body{color:#e8dac5;font-family:Georgia,serif;font-size:12px;overflow:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a0804}::-webkit-scrollbar-thumb{background:#3a2a14;border-radius:2px}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) translateX(-50%)}100%{opacity:0;transform:translateY(-48px) translateX(-50%)}}
@keyframes popIn{0%{opacity:0;transform:scale(.75)}60%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes bossGlow{0%,100%{border-color:#4a2810}50%{border-color:#dd6020}}
@keyframes flaskReady{0%,100%{opacity:1}50%{opacity:.7}}

/* ── LAYOUT ── */
#root{display:flex;flex-direction:column;height:100vh;background:#090705;position:relative}
#hdr{display:flex;align-items:center;gap:10px;padding:5px 12px;background:#100d07;border-bottom:1px solid #3a2814;flex-shrink:0;min-height:44px}
#hdr h1{font-size:12px;color:#f0b030;letter-spacing:3px;white-space:nowrap}
.hb{display:flex;align-items:center;gap:3px;font-size:10px;white-space:nowrap}
.hl{color:#786855}.hv{color:#c89028;font-weight:bold}
#xpw{flex:1;min-width:50px}
#xpbg{height:4px;background:#1a1308;border:1px solid #2c2015;border-radius:2px;overflow:hidden}
#xpf{height:100%;background:#c89028;transition:width .3s}
#xpt{font-size:9px;color:#786855;text-align:right;margin-top:1px}
.sdot{width:6px;height:6px;border-radius:50%;background:#786855;flex-shrink:0}
.sdot.ok{background:#44bb88}.sdot.saving{background:#f0b030;animation:pulse 1s infinite}
#main{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── LEFT ── */
#left{width:174px;flex-shrink:0;background:#0c0a07;border-right:1px solid #2c2015;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:3px}
.pt{font-size:9px;color:#c89028;letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid #2c2015;padding-bottom:2px;margin-top:5px;margin-bottom:2px}
.pt:first-child{margin-top:0}
.hpbg{height:7px;background:#1a0808;border:1px solid #380f0f;border-radius:2px;overflow:hidden}
.hpf{height:100%;background:#aa2222;transition:width .15s}
.sr{display:flex;justify-content:space-between;font-size:11px}
.sk{color:#786855}.sv{font-weight:bold}
.eqs{background:#161209;border:1px solid #2c2015;border-radius:2px;padding:3px 5px;margin-bottom:2px}
.eqsl{font-size:8px;color:#786855}.eqsi{font-size:9px;line-height:1.3}
.cg2{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.ci{display:flex;align-items:center;gap:4px}
.cion{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:bold;flex-shrink:0;border:1px solid}
#cbadge{font-size:10px;padding:2px 7px;border:1px solid;border-radius:2px;margin-bottom:3px;display:none}
#ainfo{font-size:9px;padding:4px 6px;background:#161209;border:1px solid #2c2015;border-radius:2px;display:none;margin-bottom:2px}
.abtn{width:100%;padding:4px;font-size:9px;font-family:Georgia,serif;border:1px solid #c89028;background:#1a1208;color:#f0b030;cursor:pointer;margin-top:2px;letter-spacing:1px}
.abtn:disabled{border-color:#2c2015;color:#2c2015;background:transparent;cursor:default}
.pbtn{width:100%;padding:3px;font-size:9px;font-family:Georgia,serif;border:1px solid #ee88ee;background:#1a0820;color:#ee88ee;cursor:pointer;margin-top:2px;display:none;animation:pulse 2s infinite}
.resetbtn{width:100%;padding:3px;font-size:9px;font-family:Georgia,serif;border:1px solid #333;background:transparent;color:#444;cursor:pointer;margin-top:4px}
.resetbtn:hover{border-color:#666;color:#666}

/* ── CENTER ── */
#center{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#mapbar{display:flex;align-items:center;gap:8px;padding:5px 10px;background:#0f0d09;border-bottom:1px solid #2c2015;flex-shrink:0}
#mtbadge{font-size:10px;padding:2px 6px;background:#161209;border:1px solid #5a3e10;color:#c89028;font-weight:bold;white-space:nowrap}
#mpbg{flex:1;height:5px;background:#161209;border:1px solid #2c2015;border-radius:1px;overflow:hidden}
#mpf{height:100%;background:#c89028;transition:width .06s}
#mktxt{font-size:10px;color:#786855;white-space:nowrap}

/* Skill + Flask bar */
#skillflask-bar{display:flex;align-items:center;gap:12px;padding:5px 10px;background:#0c0a07;border-bottom:1px solid #2c2015;flex-shrink:0}
.bar-section{display:flex;align-items:center;gap:5px}
.bar-label{font-size:8px;color:#5a3e10;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}

/* Skill gem slot */
.sk-gem{width:44px;height:44px;background:#161209;border:2px solid #2c2015;border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;cursor:pointer;transition:border-color .15s;flex-shrink:0}
.sk-gem:hover{border-color:#5a3e10}
.sk-gem.active{border-color:#c89028}
.sk-gem .gico{font-size:15px;line-height:1}
.sk-gem .gname{font-size:7px;color:#786855;text-align:center;line-height:1.1;margin-top:1px;max-width:42px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sk-gem .gcd{position:absolute;bottom:0;left:0;height:3px;border-radius:0 0 1px 1px;transition:width .05s linear}
.sk-gem.empty-gem{border-style:dashed;opacity:.4}
/* Support gem slot */
.sup-gem{width:28px;height:28px;background:#0f0c07;border:1px solid #2c2015;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;position:relative;font-size:11px;transition:border-color .15s}
.sup-gem:hover{border-color:#5a3e10}
.sup-gem.active{border-color:#9858d8}
.sup-gem.empty-sup{opacity:.3;border-style:dashed}

/* Flask slot */
.fl-slot{width:28px;height:46px;background:#161209;border:1px solid #2c2015;border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;cursor:pointer;flex-shrink:0;transition:border-color .15s}
.fl-slot.has-flask{border-color:#2a4a1a}
.fl-slot.fl-active{border-color:#44aa22;animation:flaskReady .8s infinite}
.fl-slot .fln{font-size:13px;line-height:1}
.fl-slot .flcd{position:absolute;bottom:0;left:0;right:0;height:3px;background:#1a3a0a;border-radius:0 0 2px 2px}
.fl-slot .flcdf{height:100%;background:#44aa22;transition:width .1s linear}
.fl-slot .flname{font-size:7px;color:#786855;text-align:center;line-height:1.1;margin-top:1px;max-width:26px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fl-slot.empty-fl{border-style:dashed;opacity:.3}

/* Active buff strip */
#buff-strip{display:flex;gap:4px;padding:3px 10px;background:#0a0804;border-bottom:1px solid #1a1208;flex-shrink:0;min-height:20px;align-items:center;flex-wrap:wrap}
.buff-pill{font-size:9px;padding:1px 6px;border-radius:10px;border:1px solid;white-space:nowrap}

#ebox{margin:6px 10px 0;padding:8px 10px;border:1px solid #2c2015;background:#0f0d09;flex-shrink:0;border-radius:2px}
#ebox.boss{animation:bossGlow 1.2s infinite}
#ename{font-size:13px;font-weight:bold}
.emods{display:flex;gap:3px;margin-top:2px;flex-wrap:wrap}
.emod{font-size:8px;padding:1px 4px;background:rgba(180,70,10,.2);color:#ff8844;border:1px solid #773310;border-radius:2px;font-style:italic}
#ehpbg{height:7px;background:#1a0808;border:1px solid #2c2015;border-radius:1px;overflow:hidden;margin-top:5px;position:relative}
#ehpf{height:100%;background:#aa1111;transition:width .08s}
#ehpt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:bold}
#log{flex:1;margin:6px 10px 8px;background:#0f0d09;border:1px solid #2c2015;overflow-y:auto;padding:4px 6px;border-radius:2px;min-height:0}
.ll{font-size:11px;line-height:1.5}.ll.area{border-top:1px solid #2c2015;padding-top:2px;margin-top:2px;font-style:italic}

/* ── RIGHT ── */
#right{width:230px;flex-shrink:0;background:#0c0a07;border-left:1px solid #2c2015;display:flex;flex-direction:column;overflow:hidden}
#tabs{display:flex;border-bottom:1px solid #2c2015;flex-shrink:0;flex-wrap:wrap}
.tb{flex:1;min-width:0;padding:5px 0;font-size:8px;font-family:Georgia,serif;letter-spacing:.5px;border:none;cursor:pointer;background:transparent;color:#786855;border-bottom:2px solid transparent;transition:all .1s}
.tb.active{background:#0f0d09;color:#f0b030;border-bottom-color:#c89028}
#tcon{flex:1;overflow-y:auto;padding:8px;min-height:0}

/* Passive nodes */
.pgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:7px}
.pn{aspect-ratio:1;border:2px solid #2c2015;background:#161209;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:bold;color:#2c2015;cursor:default;transition:border-color .1s,background .1s;position:relative;font-family:Georgia,serif}
.pn.sm{border-radius:50%}.pn.no{border-radius:18%}.pn.ks{border-radius:3px}
.pn.av{border-color:#5a3e10;color:#5a3e10;cursor:pointer}
.pn.al{border-color:#c89028;background:#1e1508;color:#f0b030}
.ptt{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#100c06;border:1px solid #4a3418;padding:6px 8px;width:150px;z-index:50;font-size:10px;color:#e8dac5;border-radius:2px;white-space:pre-line;pointer-events:none}
.ptt b{color:#c89028;display:block;margin-bottom:2px;font-size:9px}
.pn:hover .ptt{display:block}

/* Upgrade */
.uc{background:#161209;border:1px solid #2c2015;border-radius:2px;padding:5px 7px;margin-bottom:4px}
.uc.can{border-color:#5a3e10}
.uh{display:flex;align-items:center;gap:4px;margin-bottom:2px}
.uico{font-size:13px}.unm{font-size:10px;font-weight:bold;flex:1}.ulv{font-size:8px;color:#5a3e10}
.ud{font-size:9px;color:#786855;font-style:italic;margin-bottom:2px}
.upb{height:3px;background:#0a0806;border:1px solid #2c2015;overflow:hidden;margin-bottom:3px}
.upbf{height:100%;background:#c89028}
.ub{width:100%;padding:2px;font-size:9px;font-family:Georgia,serif;border:1px solid #2c2015;background:transparent;color:#2c2015;cursor:default;transition:all .1s}
.ub.buy{border-color:#c89028;color:#f0b030;cursor:pointer;background:#1a1208}
.ub.max{border-color:#5a3e10;color:#5a3e10}

/* Skills tab */
.gem-picker{background:#161209;border:1px solid #2c2015;border-radius:3px;padding:7px;margin-bottom:5px;cursor:pointer;transition:border-color .12s}
.gem-picker:hover{border-color:#5a3e10}
.gem-picker.selected{border-color:#c89028;background:#1a1508}
.gp-head{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.gp-ico{font-size:16px}.gp-name{font-size:10px;font-weight:bold;color:#f0b030;flex:1}
.gp-type{font-size:9px;padding:1px 5px;border-radius:2px;font-style:italic}
.gp-desc{font-size:9px;color:#a89878;line-height:1.4}
.gp-stats{font-size:9px;color:#4080d0;margin-top:2px}
.sup-picker{background:#0f0c07;border:1px solid #2c2015;border-radius:3px;padding:6px;margin-bottom:4px;cursor:pointer;transition:border-color .12s}
.sup-picker:hover{border-color:#9858d8}
.sup-picker.selected{border-color:#9858d8;background:#140a1e}
.sp-head{display:flex;align-items:center;gap:5px}
.sp-ico{font-size:13px}.sp-name{font-size:10px;font-weight:bold;color:#9858d8;flex:1}
.sp-desc{font-size:9px;color:#a89878;margin-top:2px;line-height:1.4}

/* Craft tab */
.craft-section{margin-bottom:10px}
.craft-item-row{display:flex;align-items:center;gap:6px;background:#161209;border:1px solid #2c2015;border-radius:3px;padding:5px 7px;margin-bottom:3px;cursor:pointer;transition:border-color .12s}
.craft-item-row:hover{border-color:#5a3e10}
.craft-item-row.selected{border-color:#c89028;background:#1a1508}
.ci-name{font-size:10px;flex:1}.ci-slot{font-size:9px;color:#786855}
.craft-enhance-btn{width:100%;padding:6px;font-size:10px;font-family:Georgia,serif;border:1px solid #2c2015;background:transparent;color:#2c2015;cursor:default;border-radius:2px;margin-bottom:3px;transition:all .12s;text-align:left}
.craft-enhance-btn.can{border-color:#c89028;color:#f0b030;cursor:pointer;background:#1a1208}
.craft-enhance-btn.can:hover{background:#2a2008}
.craft-result-preview{background:#0f0d09;border:1px solid #3a5a10;border-radius:3px;padding:7px;margin-top:6px;font-size:10px}

/* Inventory */
.iv{background:#161209;border:1px solid #2c2015;border-radius:2px;padding:5px 6px;margin-bottom:3px;cursor:pointer}
.iv:hover{border-color:#5a3e10}

/* Overlay */
#overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.9);z-index:100;align-items:flex-start;justify-content:center;padding-top:20px;overflow-y:auto}
#overlay.show{display:flex}
.obox{background:#120e06;border:2px solid #5a3e10;padding:20px;max-width:620px;width:95%;border-radius:3px;margin-bottom:20px}
.obox h2{font-size:14px;color:#f0b030;letter-spacing:2px;margin-bottom:4px;text-align:center}
.osub{font-size:11px;color:#786855;margin-bottom:12px;text-align:center}
.obtnrow{display:flex;gap:8px;margin-top:12px}
.opri{flex:1;padding:8px;font-size:12px;font-weight:bold;letter-spacing:2px;border:2px solid #c89028;color:#f0b030;background:#1a1208;cursor:pointer;font-family:Georgia,serif}
.osec{padding:8px 12px;background:transparent;border:1px solid #2c2015;color:#786855;cursor:pointer;font-family:Georgia,serif;font-size:11px}
.cg6{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ccard{background:#100c06;border:1px solid #3a2810;border-radius:3px;padding:10px 8px;cursor:pointer;text-align:center;transition:border-color .15s}
.ccard:hover{border-color:#c89028}
.ccico{font-size:20px;margin-bottom:4px}.ccnm{font-size:11px;font-weight:bold;letter-spacing:1px;margin-bottom:2px}.cctg{font-size:9px;color:#786855;font-style:italic;margin-bottom:4px}.ccbn{font-size:9px;color:#a89878;line-height:1.4}
.ag3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.acard{background:#161209;border:1px solid #3a2810;border-radius:3px;padding:10px 8px;cursor:pointer;text-align:center;transition:border-color .15s}
.acard:hover{border-color:#c89028}
.ang{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.anc{background:#161209;border:1px solid #2c2015;border-radius:3px;padding:8px;cursor:pointer;transition:border-color .15s}
.anc:hover:not(.taken):not(.locked){border-color:#c89028}
.anc.taken{border-color:#c89028;background:#1e1508;cursor:default}
.anc.locked{opacity:.4;cursor:default}
.anname{font-size:10px;font-weight:bold;margin-bottom:2px}.antype{font-size:9px;color:#786855;font-style:italic;margin-bottom:3px}.andesc{font-size:9px;color:#a89878;line-height:1.4;white-space:pre-line}
.pug{background:#161209;border:1px solid #2c2015;border-radius:2px;padding:6px 8px;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.fdmg{position:absolute;pointer-events:none;z-index:200;font-size:12px;font-weight:bold;animation:floatUp .9s ease forwards;transform:translateX(-50%)}
#notifarea{position:absolute;top:48px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:4px;align-items:center;pointer-events:none;z-index:300}
.notif{background:rgba(6,4,2,.97);padding:4px 16px;font-size:11px;font-weight:bold;letter-spacing:2px;animation:popIn .2s ease;border-radius:2px}
</style>
</head>
<body>
<div id="root">
<div id="hdr">
  <h1>PATH OF IDLE</h1>
  <div class="hb"><span class="hl">Lv</span><span class="hv" id="hlv">1</span></div>
  <div class="hb"><span class="hl">DPS</span><span class="hv" id="hdps">0/s</span></div>
  <div class="hb"><span class="hl">Kills</span><span class="hv" id="hkills">0</span></div>
  <div class="hb"><span class="hl">Prestige</span><span class="hv" id="hpres" style="color:#ee88ee">0</span></div>
  <div id="xpw"><div id="xpbg"><div id="xpf" style="width:0%"></div></div><div id="xpt">0/100</div></div>
  <div class="hb"><span class="hl" id="harea">The Coast T1</span></div>
  <div class="sdot" id="sdot"></div>
</div>
<div id="main">
  <div id="left">
    <div id="cbadge"></div>
    <div class="pt">Character</div>
    <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px"><span class="sk">Life</span><span id="hptxt" style="color:#cc3535;font-weight:bold">200/200</span></div>
    <div class="hpbg"><div class="hpf" id="hpbar" style="width:100%"></div></div>
    <div style="margin-top:4px;display:flex;flex-direction:column;gap:2px">
      <div class="sr"><span class="sk">Phys</span><span class="sv" id="sdmg">5-12</span></div>
      <div class="sr"><span class="sk">Skill DPS</span><span class="sv" id="sdps" style="color:#f0b030">0/s</span></div>
      <div class="sr"><span class="sk">Atk Spd</span><span class="sv" id="saspd">1.20/s</span></div>
      <div class="sr"><span class="sk">Crit</span><span class="sv" id="scrit">5%/150%</span></div>
      <div class="sr"><span class="sk">Arm</span><span class="sv" id="sarm">50</span></div>
      <div class="sr"><span class="sk">Curr</span><span class="sv" id="scurr" style="color:#a89878">0</span></div>
      <div class="sr"><span class="sk">×Mult</span><span class="sv" id="scmult" style="color:#a89878">×1.0</span></div>
    </div>
    <div id="ainfo"><div style="color:#786855;font-size:8px">Ascendancy</div><div id="aname" style="font-weight:bold;margin-top:1px"></div><div id="ataken" style="color:#786855;margin-top:1px;font-size:9px"></div></div>
    <button class="abtn" id="ascbtn" onclick="openOverlay('asc')" disabled>ASCENDANCY</button>
    <button class="pbtn" id="pbtn" onclick="openOverlay('prestige')">PRESTIGE (<span id="hpp">0</span>pt)</button>
    <div class="pt">Equipment</div>
    <div id="eqslots"></div>
    <div class="pt">Currency</div>
    <div class="cg2" id="currgrid"></div>
    <button class="resetbtn" onclick="confirmReset()">Reset Save</button>
  </div>

  <div id="center">
    <div id="mapbar">
      <div id="mtbadge">T1 MAP</div>
      <div id="mpbg"><div id="mpf" style="width:0%"></div></div>
      <div id="mktxt"><span id="mkc">0</span>/<span id="mkt">20</span> kills</div>
    </div>

    <!-- Skill + Flask bar -->
    <div id="skillflask-bar">
      <div class="bar-section">
        <span class="bar-label">Skill</span>
        <div id="main-gem-slot"></div>
        <span class="bar-label" style="color:#9858d8">+</span>
        <div id="sup-gem-slots" style="display:flex;gap:3px"></div>
      </div>
      <div style="flex:1"></div>
      <div class="bar-section">
        <span class="bar-label">Flasks</span>
        <div id="flask-slots" style="display:flex;gap:4px"></div>
      </div>
    </div>

    <!-- Active buff strip -->
    <div id="buff-strip"></div>

    <div id="ebox">
      <div style="display:flex;align-items:baseline;gap:8px"><span id="ename" style="color:#c0c0c0">Rhoa</span><div class="emods" id="emods"></div></div>
      <div id="ehpbg"><div id="ehpf" style="width:100%"></div><div id="ehpt"></div></div>
    </div>
    <div id="log"></div>
  </div>

  <div id="right">
    <div id="tabs">
      <button class="tb active" onclick="setTab('passive')">PASS</button>
      <button class="tb" onclick="setTab('upgrade')">UPG</button>
      <button class="tb" onclick="setTab('skills')">GEMS</button>
      <button class="tb" onclick="setTab('craft')">CRAFT</button>
      <button class="tb" onclick="setTab('inventory')">LOOT</button>
    </div>
    <div id="tcon"></div>
  </div>
</div>
<div id="overlay" onclick="overlayBgClick(event)"><div class="obox" id="obox"></div></div>
<div id="floatarea" style="position:absolute;inset:0;pointer-events:none;z-index:200;overflow:hidden"></div>
<div id="notifarea"></div>
</div>

<script>
// ── FORMAT ─────────────────────────────────────────────────────
const SFX=["","K","M","B","T","Qa","Qi","Sx","Sp","Oc","No","Dc","UDc"];
function fmt(n){if(!isFinite(n)||n==null)return"0";if(n<0)return"-"+fmt(-n);if(n<1000)return Math.floor(n)+"";let i=0;while(n>=1000&&i<SFX.length-1){n/=1000;i++;}return(n>=100?Math.floor(n):n>=10?n.toFixed(1):n.toFixed(2))+SFX[i];}

const SAVE_KEY="poe_idle_v6";
function setSdot(st){const d=document.getElementById("sdot");if(d)d.className="sdot"+(st==="ok"?" ok":st==="saving"?" saving":"");}
let saveTimer=null;
function saveGame(){if(!gs)return;setSdot("saving");try{localStorage.setItem(SAVE_KEY,JSON.stringify({...gs,enemy:null}));setSdot("ok");}catch(e){setSdot("");}}
function sched(){clearTimeout(saveTimer);saveTimer=setTimeout(saveGame,3000);}
function loadGame(){try{const r=localStorage.getItem(SAVE_KEY);if(!r)return null;return JSON.parse(r);}catch(e){return null;}}
function confirmReset(){if(confirm("Reset ALL progress? Cannot be undone.")){localStorage.removeItem(SAVE_KEY);location.reload();}}

// ── RECALC ──────────────────────────────────────────────────────
function recalc(s){
  let pp=0,ap=0,hp=0,ar=0,res=0,ll=0,cr=0,cm=0,cuM=1,dmM=1,hpM=1,asM=1,cMx=1;
  const se=s.se||{};
  if(se.physPct)pp+=se.physPct;if(se.aspdPct)ap+=se.aspdPct;if(se.hpPct)hp+=se.hpPct;if(se.crit)cr+=se.crit;if(se.critM)cm+=se.critM;
  for(const id of(s.allocated||[])){const n=PASSIVES.find(x=>x.id===id);if(!n)continue;const e=n.eff;if(e.physPct)pp+=e.physPct;if(e.aspdPct)ap+=e.aspdPct;if(e.hpPct)hp+=e.hpPct;if(e.armPct)ar+=e.armPct;if(e.crit)cr+=e.crit;if(e.critM)cm+=e.critM;if(e.resist)res+=e.resist;if(e.leech)ll+=e.leech;}
  if(s.ascKey&&s.classKey){const cls=CLASSES[s.classKey];if(cls?.asc[s.ascKey]){const asc=cls.asc[s.ascKey];for(const id of(s.ascTaken||[])){const nd=asc.nodes.find(x=>x.id===id);if(!nd)continue;const e=nd.eff;if(e.physPct)pp+=e.physPct;if(e.aspdPct)ap+=e.aspdPct;if(e.hpPct)hp+=e.hpPct;if(e.armPct)ar+=e.armPct;if(e.crit)cr+=e.crit;if(e.critM)cm+=e.critM;if(e.resist)res+=e.resist;if(e.leech)ll+=e.leech;if(e.currMult)cuM*=e.currMult;if(e.critMx)cMx*=e.critMx;}}}
  for(const def of UPGRADES){const lv=s.upgrades[def.id]||0;if(!lv)continue;const e=def.eff;if(e.physPct)pp+=e.physPct*lv;if(e.aspdPct)ap+=e.aspdPct*lv;if(e.hpPct)hp+=e.hpPct*lv;if(e.armPct)ar+=e.armPct*lv;if(e.critM)cm+=e.critM*lv;if(e.currMult)cuM*=(1+e.currMult*lv);}
  for(const it of Object.values(s.equip)){if(!it?.eff)continue;const e=it.eff;if(e.physPct)pp+=e.physPct;if(e.aspdPct)ap+=e.aspdPct;if(e.hpPct)hp+=e.hpPct;if(e.armPct)ar+=e.armPct;if(e.crit)cr+=e.crit;if(e.critM)cm+=e.critM;if(e.resist)res+=e.resist;if(e.leech)ll+=e.leech;if(e.currMult)cuM*=e.currMult;}
  for(const[id,cnt]of Object.entries(s.pUpgrades||{})){if(!cnt)continue;const pd=PUPS.find(x=>x.id===id);if(!pd)continue;const e=pd.eff;if(e.dmgMult)dmM*=Math.pow(e.dmgMult,cnt);if(e.hpMult)hpM*=Math.pow(e.hpMult,cnt);if(e.aspdMult)asM*=Math.pow(e.aspdMult,cnt);if(e.currMult)cuM*=Math.pow(e.currMult,cnt);if(e.allMult){dmM*=Math.pow(e.allMult,cnt);hpM*=Math.pow(e.allMult,cnt);asM*=Math.pow(e.allMult,cnt);}}
  const pM=(1+pp/100)*dmM;
  s.physMin=Math.floor(s.basePhysMin*pM); s.physMax=Math.floor(s.basePhysMax*pM);
  s.aspd=Math.min(s.baseAspd*(1+ap/100)*asM,20);
  s.critChance=Math.min(s.baseCrit+cr,95); s.critMulti=(s.baseCritM+cm)*cMx;
  s.maxHp=Math.floor(s.baseHp*(1+hp/100)*hpM); s.hp=Math.min(s.hp>0?s.hp:s.maxHp,s.maxHp);
  s.armor=Math.floor(s.baseArm*(1+ar/100)); s.resist=Math.min(res,90); s.leech=ll; s.currMult=cuM;
  return s;
}

// ── COMPUTED SKILL DPS ──────────────────────────────────────────
function computeSkillDps(){
  if(!gs)return 0;
  const mainDef=MAIN_GEMS.find(x=>x.id===gs.mainGem);
  if(!mainDef)return 0;
  const avgBase=(gs.physMin+gs.physMax)/2;
  let dmgM=mainDef.dmgM, hits=mainDef.hits||1, cdMs=mainDef.cd;
  // Apply buff aspd bonus to CD
  const aspdBuff=activeBuffs.filter(b=>b.type==="aspd").reduce((s,b)=>s+b.val,0);
  cdMs=Math.max(100,cdMs/(1+aspdBuff/100));
  // Apply support gems
  for(const sid of(gs.supGems||[])){
    if(!sid)continue;
    const sup=SUP_GEMS.find(x=>x.id===sid);if(!sup)continue;
    const m=sup.mod;
    if(m.dmgMult)dmgM*=m.dmgMult;
    if(m.extraHits){hits+=m.extraHits;if(m.dmgMult){}/* already applied */}
    if(m.cdMult)cdMs*=m.cdMult;
    if(m.bonusDmgPct)dmgM*=(1+m.bonusDmgPct/100);
    if(m.critBonus){}// handled in crit calc
  }
  const critBonus=activeBuffs.filter(b=>b.type==="crit").reduce((s,b)=>s+b.val,0);
  const crit=Math.min(gs.critChance+critBonus,95)/100;
  const critMul=gs.critMulti/100;
  const critFactor=1+crit*(critMul-1);
  const perHit=avgBase*dmgM*critFactor;
  const dps=(perHit*hits)/(cdMs/1000);
  return dps;
}

// ── SKILL FIRE ──────────────────────────────────────────────────
function fireSkill(){
  if(!gs?.enemy)return;
  const mainDef=MAIN_GEMS.find(x=>x.id===gs.mainGem);
  if(!mainDef)return;
  const avgBase=(gs.physMin+gs.physMax)/2;
  let dmgM=mainDef.dmgM, hits=mainDef.hits||1;
  let critBonus=0;
  for(const sid of(gs.supGems||[])){
    if(!sid)continue;
    const sup=SUP_GEMS.find(x=>x.id===sid);if(!sup)continue;
    const m=sup.mod;
    if(m.dmgMult)dmgM*=m.dmgMult;
    if(m.extraHits)hits+=m.extraHits;
    if(m.bonusDmgPct)dmgM*=(1+m.bonusDmgPct/100);
    if(m.critBonus)critBonus+=m.critBonus;
    if(m.culling&&gs.enemy&&gs.enemy.hp<=gs.enemy.maxHp*0.1){gs.enemy.hp=0;addLog(`✂ ${mainDef.name}: Culling Strike!`,"skill");return;}
  }
  const effCrit=Math.min(gs.critChance+critBonus,95);
  for(let h=0;h<hits;h++){
    const isCrit=Math.random()*100<effCrit;
    let dmg=Math.max(1,Math.floor(avgBase*dmgM*(isCrit?gs.critMulti/100:1)));
    gs.enemy.hp-=dmg;
    if(gs.leech>0)gs.hp=Math.min(gs.maxHp,gs.hp+dmg*gs.leech/100);
    addFloat(fmt(dmg),isCrit?"#88ddff":"#8888ff");
    if(isCrit)addLog(`✦ ${mainDef.name} CRIT! ${fmt(dmg)}`,"crit");
    else if(h===0)addLog(`✦ ${mainDef.name}: ${fmt(dmg)}`+(hits>1?` ×${hits}`:""),"skill");
  }
}

// ── FLASK FIRE ──────────────────────────────────────────────────
function fireFlask(slotIdx){
  if(!gs?.equippedFlasks)return;
  const fs=gs.equippedFlasks[slotIdx];if(!fs)return;
  const def=FLASK_DEFS.find(x=>x.id===fs.defId);if(!def)return;
  const now=performance.now();
  if(def.type==="life"){
    const heal=gs.maxHp*(def.healPct/100);
    gs.hp=Math.min(gs.maxHp,gs.hp+heal);
    addLog(`🧪 ${def.name}: +${fmt(heal)} HP`,"flask");
  }else if(def.type==="speed"){
    activeBuffs=activeBuffs.filter(b=>b.type!=="aspd_flask");
    activeBuffs.push({type:"aspd_flask",val:def.buffVal,label:`Quicksilver (+${def.buffVal}% Spd)`,color:"#88ddff",endAt:now+def.buffDur});
    addLog(`⚗ Quicksilver Flask active!`,"flask");
  }else if(def.type==="armor"){
    activeBuffs=activeBuffs.filter(b=>b.type!=="armor_flask");
    activeBuffs.push({type:"armor_flask",val:def.buffVal,label:`Granite (+${def.buffVal} Arm)`,color:"#aaaaaa",endAt:now+def.buffDur});
    addLog(`🪨 Granite Flask active!`,"flask");
  }else if(def.type==="crit"){
    activeBuffs=activeBuffs.filter(b=>b.type!=="crit_flask");
    activeBuffs.push({type:"crit_flask",val:def.buffVal,label:`Diamond (+${def.buffVal}% Crit)`,color:"#88ffee",endAt:now+def.buffDur});
    addLog(`💎 Diamond Flask active!`,"flask");
  }
  flaskTimers[slotIdx]=0;
}

// ── SKILL EFFECTIVE CD (with buffs) ─────────────────────────────
function effectiveSkillCd(){
  if(!gs)return 1000;
  const mainDef=MAIN_GEMS.find(x=>x.id===gs.mainGem);
  if(!mainDef)return 1000;
  let cd=mainDef.cd;
  for(const sid of(gs.supGems||[])){const sup=SUP_GEMS.find(x=>x.id===sid);if(sup?.mod.cdMult)cd*=sup.mod.cdMult;}
  const aspdBuff=activeBuffs.filter(b=>b.type==="aspd_flask").reduce((s,b)=>s+b.val,0);
  if(aspdBuff>0)cd=cd/(1+aspdBuff/100);
  return Math.max(80,cd);
}

// ── RESURRECT ──────────────────────────────────────────────────
function resurrect(){
  gs.hp=Math.floor(gs.maxHp*0.60);          // 60% HP on resurrect
  invincibleTimer=4000;                       // 4s invincibility
  // Immediately fire all life flasks
  for(let i=0;i<FLASK_SLOTS;i++){
    const fs=(gs.equippedFlasks||[])[i];if(!fs)continue;
    const def=FLASK_DEFS.find(x=>x.id===fs.defId);
    if(def?.type==="life"){flaskTimers[i]=def.interval;}  // trigger immediately next tick
  }
  // NOTE: boss HP is NOT reset - progress is kept
  addLog("💀 Defeated... Resurrected (4s invincible, boss HP kept)","level");
  showNotif("Resurrected","#88aaff");
}


function tick(ts){
  if(!lastT)lastT=ts;
  const dt=Math.min(ts-lastT,200);lastT=ts;
  if(!gs?.enemy){raf=requestAnimationFrame(tick);return;}

  // Expire buffs
  const now=performance.now();
  activeBuffs=activeBuffs.filter(b=>b.endAt>now);

  // Invincibility countdown
  if(invincibleTimer>0)invincibleTimer=Math.max(0,invincibleTimer-dt);

  // Regen
  regenT+=dt;
  if(regenT>=500){regenT-=500;gs.hp=Math.min(gs.maxHp,gs.hp+gs.maxHp*.008);}

  // Skill
  skillCD=Math.max(0,skillCD-dt);
  if(skillCD<=0){
    skillCD=effectiveSkillCd();
    fireSkill();
  }

  // Flasks (timed auto)
  if(!flaskTimers.length)flaskTimers=Array(FLASK_SLOTS).fill(99999);
  for(let i=0;i<FLASK_SLOTS;i++){
    const fs=(gs.equippedFlasks||[])[i];if(!fs)continue;
    const def=FLASK_DEFS.find(x=>x.id===fs.defId);if(!def)continue;
    flaskTimers[i]=(flaskTimers[i]||0)+dt;
    if(flaskTimers[i]>=def.interval)fireFlask(i);
  }

  // Base auto-attack (DPS display / enemy damage)
  combatT+=dt;
  const ai=1000/gs.aspd;
  if(combatT>=ai){
    combatT-=ai;
    const bD=gs.physMin+Math.random()*(gs.physMax-gs.physMin);
    const isCrit=Math.random()*100<gs.critChance;
    let dmg=Math.max(1,Math.floor(isCrit?bD*(gs.critMulti/100):bD));
    gs.enemy.hp-=dmg;
    if(gs.leech>0)gs.hp=Math.min(gs.maxHp,gs.hp+dmg*gs.leech/100);
    addFloat(fmt(dmg),isCrit?"#ffcc44":"#c0c0c0");
    if(isCrit)addLog(`CRIT! ${gs.enemy.name} — ${fmt(dmg)}`,"crit");
    else addLog(`Hit ${gs.enemy.name} for ${fmt(dmg)}`,"hit");
    const flaskArm=activeBuffs.filter(b=>b.type==="armor_flask").reduce((s,b)=>s+b.val,0);
    const mit=Math.min(0.92,(gs.armor+flaskArm)/((gs.armor+flaskArm)+500));
    const rMit=Math.min(0.75,gs.resist/100);
    const eDmg=Math.max(1,Math.floor(gs.enemy.dmg*(1-mit)*(1-rMit)));
    // Grace period: boss doesn't attack for first N ms of the encounter
    if(gs.enemy.grace>0){gs.enemy.grace=Math.max(0,gs.enemy.grace-ai);}
    else if(invincibleTimer<=0){gs.hp=Math.max(0,gs.hp-eDmg);}
    if(gs.enemy.mods.includes("Regen"))gs.enemy.hp=Math.min(gs.enemy.maxHp,gs.enemy.hp+eDmg*.2);
    if(gs.enemy.hp<=0)onKill();
    else if(gs.hp<=0)resurrect();
  }

  updateUI();
  renderSkillFlaskBar();
  renderBuffStrip();
  raf=requestAnimationFrame(tick);
}

function genEnemy(area,kl){
  const pm=Math.pow(2.5,gs.prestigeLvl||0);
  if(kl<=1)return{name:pick(BPOOL),rarity:"boss",maxHp:area.hp*5*pm,hp:area.hp*5*pm,dmg:area.dmg*1.5*pm,mods:["BOSS"],grace:3000};
  const r=Math.random();const rarity=r<.03?"rare":r<.2?"magic":"normal";
  const rH=rarity==="magic"?5:rarity==="rare"?12:1;
  const mods=rarity==="rare"?[pick(["Burning","Frozen","Empowered"]),pick(["Regen","Barrier"])]:rarity==="magic"?[pick(["Burning","Frozen"])]:[];
  const base=pick(EPOOL);
  const name=rarity==="rare"?`${pick(PRE)} ${base} ${pick(SUF)}`:rarity==="magic"?`Mutant ${base}`:base;
  return{name,rarity,maxHp:area.hp*rH*pm,hp:area.hp*rH*pm,dmg:area.dmg*(rarity==="rare"?1.8:rarity==="magic"?1.3:1)*pm,mods};
}
function genItem(tier,rarOvr){
  const mult=1+(gs.prestigeLvl||0)*0.6;
  if(rarOvr==="unique"||Math.random()<.012){const u=pick(UNIQ);const eff={};for(const[k,v]of Object.entries(u.eff))eff[k]=v*mult;return{...u,rarity:"unique",eff,mods:[]};}
  const rarity=rarOvr||(Math.random()<.07?"rare":Math.random()<.25?"magic":"normal");
  const slot=pick(SLOTS);const base=pick(SBASES[slot]);
  const pB=Math.floor((tier*12+ri(10,40))*mult*(rarity==="rare"?1.8:1));
  const hB=Math.floor((tier*15+ri(15,50))*mult*(rarity==="rare"?1.8:1));
  let name,stats=[],eff={},mods=[];
  if(rarity==="normal"){name=base;}
  else if(rarity==="magic"){
    name=`${pick(PRE)} ${base}`;
    const m=pickCraftMod(slot);mods=[m];eff=modsToEff(mods);stats=mods.map(x=>x.label);
  }else{
    name=`${pick(PRE)} ${base} ${pick(SUF)}`;
    const count=3+Math.floor(Math.random()*2);
    for(let i=0;i<count;i++)mods.push(pickCraftMod(slot));
    eff=modsToEff(mods);stats=mods.map(x=>x.label);
  }
  return{name,slot,rarity,stats,eff,mods};
}

function onKill(){
  const area=AREAS[Math.min(gs.areaIdx,AREAS.length-1)];
  gs.kills++;gs.totalKills++;addLog(`Slew ${gs.enemy.name}!`,"kill");
  const eg=Math.floor((15+area.t*8)*(gs.enemy.rarity==="boss"?30:gs.enemy.rarity==="rare"?8:gs.enemy.rarity==="magic"?3:1));
  gs.exp+=eg;
  while(gs.exp>=gs.expNext){
    gs.exp-=gs.expNext;gs.level++;gs.passivePoints++;
    gs.baseHp=Math.floor(gs.baseHp*1.08);gs.baseArm=Math.floor(gs.baseArm*1.05);
    gs.expNext=Math.floor(100*Math.pow(1.22,gs.level-1));
    addLog(`Level Up! Lv.${gs.level} — Passive point!`,"level");
    showNotif(`LEVEL UP  Lv.${gs.level}`,"#88aaff");
    recalc(gs);
  }
  const ct=CURRD.reduce((a,c)=>a+c.w,0);let cr=Math.random()*ct,cc=0;
  for(const c of CURRD){cc+=c.w;if(cr<cc){if(Math.random()<.4||gs.enemy.rarity!=="normal"){const qty=gs.enemy.rarity==="boss"?ri(3,10):1;const mult=Math.max(1,Math.floor(gs.currMult));const tot=qty*mult;gs.currency[c.id]+=tot;addLog(`${c.name} x${tot}`+(mult>1?` (x${mult})`:""),"currency");}break;}}
  const ir=Math.random();const dr=gs.enemy.rarity==="boss"?(Math.random()<.2?"unique":"rare"):ir<.012?"unique":ir<.08?"rare":ir<.3?"magic":ir<.55?"normal":null;
  if(dr){
    const item=genItem(area.t,dr);const cs=iScore(gs.equip[item.slot]);const ns=iScore(item);
    if(ns>cs){if(gs.equip[item.slot])gs.inventory.push(gs.equip[item.slot]);gs.equip[item.slot]=item;addLog(`Auto-equipped ${item.name}!`,"kill");recalc(gs);}
    else{gs.inventory.push(item);if(gs.inventory.length>20)gs.inventory.shift();}
    if(item.rarity==="unique"){addLog(`UNIQUE FOUND: ${item.name}`,"unique");showNotif(item.name,RCOL.unique);}
    else if(item.rarity!=="normal")addLog(`${item.rarity==="rare"?"★":"◆"} ${item.name}`,"drop");
    if(curTab==="inventory")renderTab();
  }
  if(gs.areaIdx>=AREAS.length-1&&gs.kills>=area.kills){gs.prestigePts++;addLog("Max area looped! +1 Prestige Point!","prestige");showNotif("+1 Prestige Pt","#ee88ee");}
  if(gs.kills>=area.kills){
    gs.kills=0;gs.areaClears=(gs.areaClears||0)+1;
    if(gs.areaClears%10===0){gs.ascPoints=(gs.ascPoints||0)+1;addLog(`Labyrinth cleared! Ascendancy Point! (${gs.ascPoints} total)`,"asc");showNotif("ASCENDANCY POINT!","#f0b030");updateAscBtn();}
    const next=Math.min(gs.areaIdx+1,AREAS.length-1);
    if(next!==gs.areaIdx){addLog(`Cleared "${area.name}" — ${AREAS[next].name} T${AREAS[next].t}`,"area");showNotif(`T${AREAS[next].t} ${AREAS[next].name}`,"#c89028");}
    gs.areaIdx=next;gs.enemy=genEnemy(AREAS[next],AREAS[next].kills);
  }else{gs.enemy=genEnemy(area,area.kills-gs.kills);}
  if(gs.hp<=0){resurrect();}
  sched();
}

function renderSkillsTab(el){
  const lv=gs.level;
  let h=`<div style="font-size:10px;color:#786855;margin-bottom:6px">Choose 1 main skill + up to 3 support gems.</div>`;

  // Main gem section
  h+=`<div class="pt">Main Skill Gem</div>`;
  for(const def of MAIN_GEMS){
    const locked=lv<def.unlockLv;
    const active=gs.mainGem===def.id;
    if(locked)continue;
    h+=`<div class="gem-picker${active?" selected":""}" onclick="selectMainGem('${def.id}')">
      <div class="gp-head">
        <span class="gp-ico">${def.ico}</span>
        <span class="gp-name">${def.name}</span>
        <span class="gp-type" style="background:${def.color}22;color:${def.color};border:1px solid ${def.color}44">${def.type}</span>
      </div>
      <div class="gp-desc">${def.desc}</div>
      <div class="gp-stats">CD: ${def.cd/1000}s · ×${def.dmgM} dmg${def.hits?` · ${def.hits} hits`:""}</div>
    </div>`;
  }
  const lockedMains=MAIN_GEMS.filter(d=>lv<d.unlockLv);
  if(lockedMains.length){h+=`<div style="font-size:9px;color:#3a3020;margin-top:4px;font-style:italic">${lockedMains.length} skills locked (keep leveling)</div>`;}

  // Support gem section
  h+=`<div class="pt" style="margin-top:8px">Support Gems (slots 1-3)</div>`;
  for(let i=0;i<3;i++){
    const sid=gs.supGems[i];
    const sup=sid?SUP_GEMS.find(x=>x.id===sid):null;
    h+=`<div style="font-size:9px;color:#786855;margin-bottom:3px">Slot ${i+1}: ${sup?`<b style="color:${sup.color}">${sup.name}</b>`:"Empty"} <button onclick="clearSupGem(${i})" style="font-size:8px;font-family:Georgia,serif;background:transparent;border:1px solid #2c2015;color:#555;cursor:pointer;padding:0 4px;margin-left:4px">✕ Clear</button></div>`;
  }
  h+=`<div style="font-size:9px;color:#9858d8;margin-bottom:4px;margin-top:4px">Available Support Gems:</div>`;
  for(const sup of SUP_GEMS){
    if(lv<sup.unlockLv)continue;
    const inSlot=gs.supGems.indexOf(sup.id);
    h+=`<div class="sup-picker${inSlot>=0?" selected":""}" onclick="cycleSup('${sup.id}')">
      <div class="sp-head"><span class="sp-ico">${sup.ico}</span><span class="sp-name">${sup.name}</span>${inSlot>=0?`<span style="font-size:8px;color:#44aa22">Slot ${inSlot+1}</span>`:""}</div>
      <div class="sp-desc">${sup.desc}</div>
    </div>`;
  }
  el.innerHTML=h;
}

function selectMainGem(id){gs.mainGem=id;skillCD=0;addLog(`✦ Skill: ${MAIN_GEMS.find(x=>x.id===id)?.name}`,"skill");renderTab();renderSkillFlaskBar();sched();}
function cycleSup(id){
  const sups=gs.supGems;
  const existing=sups.indexOf(id);
  if(existing>=0){sups[existing]=null;}else{
    const empty=sups.findIndex(s=>!s);
    if(empty>=0)sups[empty]=id;
    else sups[2]=id;
  }
  addLog(`Support gem updated.`,"skill");renderTab();renderSkillFlaskBar();sched();
}
function clearSupGem(i){gs.supGems[i]=null;renderTab();renderSkillFlaskBar();sched();}

function renderCraftTab(el){
  const ct=cTot(gs.currency);
  let h=`<div style="font-size:10px;color:#786855;margin-bottom:6px">Select an item, then spend currency to enhance it.</div>`;

  // Item selector
  h+=`<div class="pt">Select Item</div>`;
  for(const[slot,item]of Object.entries(gs.equip)){
    if(!item)continue;
    const key="eq:"+slot;const sel=craftSel===key;const col=RCOL[item.rarity]||RCOL.normal;
    h+=`<div class="craft-item-row${sel?" selected":""}" onclick="craftSelect('${key}')"><div class="ci-name" style="color:${col}">${item.name}</div><div class="ci-slot">${SLOTL[slot]}</div></div>`;
  }
  for(let i=0;i<gs.inventory.length;i++){
    const item=gs.inventory[i];if(!item)continue;
    const sel=craftSel===i;const col=RCOL[item.rarity]||RCOL.normal;
    h+=`<div class="craft-item-row${sel?" selected":""}" onclick="craftSelect(${i})"><div class="ci-name" style="color:${col}">${item.name}</div><div class="ci-slot">${SLOTL[item.slot]||""}</div></div>`;
  }

  // Craft actions
  const selItem=getCraftItem();
  h+=`<div class="pt" style="margin-top:8px">Enhancements</div>`;
  if(!selItem){h+=`<div style="font-size:10px;color:#786855;font-style:italic">Select an item above</div>`;}
  else{
    const col=RCOL[selItem.rarity]||RCOL.normal;
    const mods=selItem.mods||[];
    // Re-roll single mod (Alt) — magic+
    if(selItem.rarity==="magic"||selItem.rarity==="rare"){
      const can=(gs.currency.alt||0)>=1;
      h+=`<button class="craft-enhance-btn${can?" can":""}" onclick="${can?"craftAction('reroll_mod')":""}">🔄 Re-roll one mod (1 Alt) · ${fmt(gs.currency.alt||0)} Alt available</button>`;
    }
    // Add mod (Alch) — normal→magic, or magic/rare with <6 mods
    if((selItem.rarity==="normal"||((selItem.rarity==="magic"||selItem.rarity==="rare")&&mods.length<6))){
      const cost=selItem.rarity==="normal"?{alch:1}:mods.length<3?{alch:1}:{chaos:1};
      const costStr=Object.entries(cost).map(([c,a])=>`${a} ${c}`).join(", ");
      const can=Object.entries(cost).every(([c,a])=>(gs.currency[c]||0)>=a);
      h+=`<button class="craft-enhance-btn${can?" can":""}" onclick="${can?`craftAction('add_mod',${JSON.stringify(cost).replace(/"/g,"'")})`:""}">✦ Add mod (${costStr}) · ${mods.length} mods currently</button>`;
    }
    // Re-roll all (Chaos) — rare
    if(selItem.rarity==="rare"){
      const can=(gs.currency.chaos||0)>=1;
      h+=`<button class="craft-enhance-btn${can?" can":""}" onclick="${can?"craftAction('reroll_all')":""}">🌀 Re-roll all mods (1 Chaos) · ${fmt(gs.currency.chaos||0)} Chaos available</button>`;
    }
    // Add premium mod (Exalt)
    if((selItem.rarity==="magic"||selItem.rarity==="rare")&&mods.length<6){
      const can=(gs.currency.exalt||0)>=1;
      h+=`<button class="craft-enhance-btn${can?" can":""}" onclick="${can?"craftAction('exalt_mod')":""}">✨ Add premium mod (1 Exalt) · ${fmt(gs.currency.exalt||0)} Exalt available</button>`;
    }
    // Preview
    h+=`<div class="craft-result-preview"><div style="font-weight:bold;color:${col};margin-bottom:4px">${selItem.name}</div><div style="font-size:9px;color:#786855;font-style:italic;margin-bottom:3px">${selItem.rarity} · ${selItem.slot}</div>`;
    for(const m of mods)h+=`<div style="font-size:9px;color:#4080d0;padding:1px 0">${m.label||m}</div>`;
    if(!mods.length)h+=`<div style="font-size:9px;color:#3a3020;font-style:italic">No mods</div>`;
    h+=`</div>`;
    // Flask equip section
    h+=`<div class="pt" style="margin-top:8px">Flask Belt</div>`;
    h+=`<div style="font-size:9px;color:#786855;margin-bottom:4px">Spend currency to equip flasks (auto-fire every N seconds).</div>`;
    const flaskBuys=[
      {defId:"fl_life_s", cost:{alt:3},  lv:1},
      {defId:"fl_life_m", cost:{alch:2}, lv:5},
      {defId:"fl_life_l", cost:{chaos:1},lv:12},
      {defId:"fl_quick",  cost:{alch:3}, lv:4},
      {defId:"fl_granite",cost:{alch:4}, lv:8},
      {defId:"fl_diamond",cost:{chaos:1},lv:10},
      {defId:"fl_divine", cost:{exalt:1},lv:20},
    ];
    for(const fb of flaskBuys){
      if(gs.level<fb.lv)continue;
      const def=FLASK_DEFS.find(x=>x.id===fb.defId);if(!def)continue;
      const costStr=Object.entries(fb.cost).map(([c,a])=>`${a} ${c}`).join(", ");
      const can=Object.entries(fb.cost).every(([c,a])=>(gs.currency[c]||0)>=a);
      const col2=RCOL[def.rarity]||RCOL.normal;
      h+=`<button class="craft-enhance-btn${can?" can":""}" onclick="${can?`buyFlask('${fb.defId}',${JSON.stringify(fb.cost).replace(/"/g,"'")})`:""}"><span style="color:${col2}">${def.ico} ${def.name}</span> · ${def.type==="life"?`Heals ${def.healPct}%`:def.desc} · Cost: ${costStr}</button>`;
    }
  }
  el.innerHTML=h;
}

function getCraftItem(){
  if(craftSel===null)return null;
  if(typeof craftSel==="string"&&craftSel.startsWith("eq:"))return gs.equip[craftSel.slice(3)]||null;
  return gs.inventory[craftSel]||null;
}
function putCraftItem(item){
  if(craftSel===null)return;
  if(typeof craftSel==="string"&&craftSel.startsWith("eq:"))gs.equip[craftSel.slice(3)]=item;
  else gs.inventory[craftSel]=item;
}
function craftSelect(key){craftSel=key;renderTab();}

function craftAction(type,costObj){
  const item=getCraftItem();if(!item)return;
  if(type==="reroll_mod"){
    if((gs.currency.alt||0)<1){showNotif("Need 1 Alt!","#ff8844");return;}
    gs.currency.alt--;
    const mods=[...(item.mods||[])];
    if(!mods.length)return;
    const idx=Math.floor(Math.random()*mods.length);
    mods[idx]=pickCraftMod(item.slot);
    putCraftItem({...item,mods,eff:modsToEff(mods),stats:mods.map(m=>m.label)});
    addLog(`🔄 Alt: Re-rolled mod on ${item.name}`,"craft");
  }else if(type==="add_mod"){
    const cost=costObj;
    for(const[c,a]of Object.entries(cost)){if((gs.currency[c]||0)<a){showNotif("Not enough!","#ff8844");return;}gs.currency[c]-=a;}
    const mods=[...(item.mods||[]),pickCraftMod(item.slot)];
    const newRarity=item.rarity==="normal"?"magic":item.rarity==="magic"&&mods.length>2?"rare":item.rarity;
    putCraftItem({...item,rarity:newRarity,mods,eff:modsToEff(mods),stats:mods.map(m=>m.label)});
    addLog(`✦ Added mod to ${item.name}`,"craft");
  }else if(type==="reroll_all"){
    if((gs.currency.chaos||0)<1){showNotif("Need 1 Chaos!","#ff8844");return;}
    gs.currency.chaos--;
    const count=(item.mods||[]).length||4;
    const mods=Array.from({length:count},()=>pickCraftMod(item.slot));
    putCraftItem({...item,mods,eff:modsToEff(mods),stats:mods.map(m=>m.label)});
    addLog(`🌀 Chaos: Re-rolled ${item.name}`,"craft");
  }else if(type==="exalt_mod"){
    if((gs.currency.exalt||0)<1){showNotif("Need 1 Exalt!","#ff8844");return;}
    gs.currency.exalt--;
    const mods=[...(item.mods||[]),pickCraftMod(item.slot)];
    putCraftItem({...item,mods,eff:modsToEff(mods),stats:mods.map(m=>m.label)});
    addLog(`✨ Exalt: Added premium mod to ${item.name}`,"craft");
  }
  recalc(gs);renderTab();sched();
}

function buyFlask(defId,costObj){
  for(const[c,a]of Object.entries(costObj)){if((gs.currency[c]||0)<a){showNotif("Not enough currency!","#ff8844");return;}gs.currency[c]-=a;}
  if(!gs.equippedFlasks)gs.equippedFlasks=Array(FLASK_SLOTS).fill(null);
  const empty=gs.equippedFlasks.findIndex(x=>!x);
  if(empty<0){showNotif("Flask slots full!","#ff8844");return;}
  gs.equippedFlasks[empty]={defId};
  flaskTimers[empty]=0;
  const def=FLASK_DEFS.find(x=>x.id===defId);
  addLog(`🧪 ${def?.name} added to flask belt (slot ${empty+1})`,"flask");
  renderTab();renderSkillFlaskBar();sched();
}

function renderInventory(el){
  let h=`<div style="font-size:10px;color:#786855;margin-bottom:4px">${gs.inventory.length}/20 slots</div>`;
  if(!gs.inventory.length)h+=`<div style="font-size:11px;color:#786855;font-style:italic;text-align:center;padding:20px 0">No items</div>`;
  else for(let i=0;i<gs.inventory.length;i++){const it=gs.inventory[i];const col=RCOL[it.rarity]||RCOL.normal;h+=`<div class="iv" style="border-color:${col}77" onclick="equipInv(${i})"><div style="font-size:10px;color:${col}">${it.name}</div><div style="font-size:9px;color:#786855;margin-top:1px">${it.slot} · ${(it.mods||it.stats||[]).slice(0,2).map(m=>typeof m==="string"?m:m.label).join(", ")}</div><div style="font-size:8px;color:#5a3e10;font-weight:bold;margin-top:2px">▶ Equip</div></div>`;}
  el.innerHTML=h;
}

// ── ACTIONS ─────────────────────────────────────────────────────
function allocP(id){const n=PASSIVES.find(x=>x.id===id);if(!n||gs.allocated.includes(id)||gs.passivePoints<=0)return;const ok=!n.req||n.req.some(r=>gs.allocated.includes(r))||gs.allocated.length===0;if(!ok){showNotif("Prerequisite required!","#ff8844");return;}gs.allocated.push(id);gs.passivePoints--;addLog(`Passive "${n.name}" allocated!`,"passive");recalc(gs);renderTab();sched();}
function buyUpg(id){const def=UPGRADES.find(x=>x.id===id);if(!def)return;const lv=gs.upgrades[id]||0;if(lv>=def.max)return;const cost=upgC(def,lv);const ct=cTot(gs.currency);if(ct<cost){showNotif("Not enough currency!","#ff8844");return;}let rem=cost;const cur={...gs.currency};for(const c of[...CURRD].reverse()){const sp=Math.min(cur[c.id],Math.ceil(rem/CURRV[c.id]));cur[c.id]-=sp;rem-=sp*CURRV[c.id];if(rem<=0)break;}gs.currency=cur;gs.upgrades[id]=(gs.upgrades[id]||0)+1;addLog(`${def.name} Lv.${gs.upgrades[id]}`,"upgrade");recalc(gs);renderTab();sched();}
function equipInv(idx){const it=gs.inventory[idx];if(!it)return;const old=gs.equip[it.slot];gs.equip[it.slot]=it;gs.inventory.splice(idx,1);if(old)gs.inventory.unshift(old);if(gs.inventory.length>20)gs.inventory.pop();addLog(`Equipped ${it.name}`,"kill");recalc(gs);renderTab();sched();}

// ── OVERLAY ─────────────────────────────────────────────────────
function openOverlay(mode){overlayMode=mode;const ov=document.getElementById("overlay");const ob=document.getElementById("obox");if(!ov||!ob)return;ov.classList.add("show");ov.scrollTop=0;if(mode==="class")renderClassSelect(ob);else if(mode==="asc")renderAscOverlay(ob);else if(mode==="prestige")renderPrestigeOverlay(ob);}
function closeOverlay(){const ov=document.getElementById("overlay");if(ov)ov.classList.remove("show");overlayMode=null;}
function overlayBgClick(e){if(e.target===document.getElementById("overlay"))closeOverlay();}

function renderClassSelect(ob){ob.style.borderColor="#c89028";ob.style.maxWidth="620px";let h=`<h2>CHOOSE YOUR EXILE</h2><div class="osub">Each class has 3 unique Ascendancy paths.</div><div class="cg6">`;for(const[ck,cls]of Object.entries(CLASSES)){const ascList=Object.values(cls.asc).map(a=>`<span style="color:${a.color};font-size:9px">${a.name}</span>`).join(" · ");h+=`<div class="ccard" onclick="selectClass('${ck}')"><div class="ccico">${cls.ico}</div><div class="ccnm" style="color:${cls.color}">${cls.name}</div><div class="cctg">${cls.tag}</div><div class="ccbn">${cls.bonus}</div><div style="margin-top:6px;line-height:1.7">${ascList}</div></div>`;}h+=`</div>`;ob.innerHTML=h;}
function renderAscOverlay(ob){if(!gs?.classKey){ob.innerHTML="<h2>No class</h2>";return;}const cls=CLASSES[gs.classKey];ob.style.borderColor="#c89028";ob.style.maxWidth="560px";if(!gs.ascKey){let h=`<h2>ASCENDANCY — ${cls.name.toUpperCase()}</h2><div class="osub">${gs.ascPoints} point(s) available. Choose your Ascendancy class.</div><div class="ag3">`;for(const[ak,asc]of Object.entries(cls.asc)){h+=`<div class="acard" onclick="chooseAsc('${ak}')" style="border-color:${asc.color}88"><div style="font-size:11px;font-weight:bold;color:${asc.color};margin-bottom:3px">${asc.name}</div><div style="font-size:9px;color:#786855;line-height:1.4">${asc.desc}</div></div>`;}h+=`</div><div class="obtnrow"><button class="osec" onclick="closeOverlay()">Cancel</button></div>`;ob.innerHTML=h;return;}const asc=cls.asc[gs.ascKey];let h=`<h2>${asc.name.toUpperCase()}</h2><div class="osub" style="color:${asc.color}">${asc.desc}</div><div style="font-size:10px;color:#786855;margin-bottom:8px">${gs.ascPoints} point(s) available · ${gs.ascTaken.length} nodes taken</div><div class="ang">`;for(const node of asc.nodes){const taken=gs.ascTaken.includes(node.id);const reqMet=!node.req||node.req.some(r=>gs.ascTaken.includes(r));const canT=!taken&&reqMet&&(gs.ascPoints||0)>=node.cost;h+=`<div class="anc${taken?" taken":!reqMet?" locked":""}" onclick="${canT?`takeAscNode('${node.id}')`:""}" style="border-color:${taken?asc.color:"#2c2015"}"><div class="anname" style="color:${taken?asc.color:"#c89028"}">${node.name}${taken?" ✦":""}</div><div class="antype">${node.t} · ${node.cost}pt</div><div class="andesc">${node.desc}</div></div>`;}h+=`</div><div class="obtnrow"><button class="osec" onclick="gs.ascKey=null;renderAscOverlay(document.getElementById('obox'))">← Change</button><button class="osec" onclick="closeOverlay()">Close</button></div>`;ob.innerHTML=h;}
function chooseAsc(ak){gs.ascKey=ak;renderAscOverlay(document.getElementById("obox"));sched();}
function takeAscNode(id){const cls=CLASSES[gs.classKey];if(!cls)return;const asc=cls.asc[gs.ascKey];if(!asc)return;const node=asc.nodes.find(x=>x.id===id);if(!node)return;if(gs.ascTaken.includes(id)||(gs.ascPoints||0)<node.cost)return;gs.ascTaken.push(id);gs.ascPoints-=node.cost;addLog(`Ascendancy: "${node.name}" taken!`,"asc");showNotif(node.name,"#f0b030");recalc(gs);updateAscBtn();renderAscOverlay(document.getElementById("obox"));sched();}
function renderPrestigeOverlay(ob){ob.style.borderColor="#ee88ee";ob.style.maxWidth="460px";let h=`<h2 style="color:#ee88ee">PRESTIGE</h2><div class="osub">Reset everything. Grow exponentially stronger.<br>Points: <b style="color:#ee88ee;font-size:13px">${gs.prestigePts}</b></div><div style="font-size:9px;color:#c89028;letter-spacing:2px;border-bottom:1px solid #2c2015;padding-bottom:3px;margin-bottom:8px">PERMANENT UPGRADES</div>`;for(const pd of PUPS){const cnt=(gs.pUpgrades||{})[pd.id]||0;const can=(gs.prestigePts||0)>=pd.cost;h+=`<div class="pug" style="border-color:${can?"#ee88ee44":"#2c2015"}"><span style="font-size:14px">${pd.ico}</span><div style="flex:1"><div style="font-size:10px;color:#ee88ee">${pd.name}${cnt>0?` <b style="color:#f0b030">x${cnt}</b>`:""}</div><div style="font-size:9px;color:#786855">${pd.desc}</div></div><button onclick="buyPU('${pd.id}')" style="padding:2px 8px;font-size:9px;background:${can?"rgba(100,0,110,.4)":"transparent"};border:1px solid ${can?"#ee88ee":"#2c2015"};color:${can?"#ee88ee":"#2c2015"};cursor:${can?"pointer":"default"};font-family:Georgia,serif">${pd.cost}pt</button></div>`;}h+=`<div class="obtnrow"><button class="opri" style="border-color:#ee88ee;color:#ee88ee;background:#1a0820" onclick="doPrestige()">✦ PRESTIGE (1pt)</button><button class="osec" onclick="closeOverlay()">Cancel</button></div>`;ob.innerHTML=h;}
function buyPU(id){const pd=PUPS.find(x=>x.id===id);if(!pd)return;if((gs.prestigePts||0)<pd.cost){showNotif("Not enough points!","#ff8844");return;}gs.pUpgrades=gs.pUpgrades||{};gs.pUpgrades[id]=(gs.pUpgrades[id]||0)+1;gs.prestigePts-=pd.cost;addLog(`Prestige upgrade "${pd.name}"!`,"prestige");recalc(gs);renderPrestigeOverlay(document.getElementById("obox"));sched();}
function doPrestige(){if(!(gs.prestigePts>0)){showNotif("Not enough points!","#ff8844");return;}const newLvl=(gs.prestigeLvl||0)+1;addLog(`PRESTIGE Lv.${newLvl} — Returning stronger!`,"prestige");showNotif(`PRESTIGE Lv.${newLvl}`,"#ee88ee");const saved={prestigeLvl:newLvl,prestigePts:gs.prestigePts-1,pUpgrades:{...gs.pUpgrades},totalKills:gs.totalKills||0};const ck=gs.classKey;gs=Object.assign(makeInit(ck),saved);recalc(gs);gs.enemy=genEnemy(AREAS[0],AREAS[0].kills);skillCD=0;flaskTimers=Array(FLASK_SLOTS).fill(99999);activeBuffs=[];invincibleTimer=0;closeOverlay();updateAscBtn();setTab("passive");saveGame();}

function selectClass(ck){gs=recalc(makeInit(ck));gs.enemy=genEnemy(AREAS[0],AREAS[0].kills);flaskTimers=Array(FLASK_SLOTS).fill(99999);skillCD=0;activeBuffs=[];invincibleTimer=0;closeOverlay();updateAscBtn();renderTab();renderSkillFlaskBar();renderBuffStrip();addLog(`${CLASSES[ck].name} chosen. The hunt begins.`,"area");saveGame();}

// ── INIT ─────────────────────────────────────────────────────────
function init(){
  setSdot("");
  const saved=loadGame();
  if(saved?.classKey&&CLASSES[saved.classKey]){
    gs=saved;
    if(!Array.isArray(gs.allocated))gs.allocated=[];
    if(!Array.isArray(gs.ascTaken))gs.ascTaken=[];
    gs.pUpgrades=gs.pUpgrades||{};
    gs.upgrades=gs.upgrades||{u0:0,u1:0,u2:0,u3:0,u4:0,u5:0,u6:0,u7:0,u8:0,u9:0};
    gs.currency=gs.currency||{alt:0,alch:0,chaos:0,exalt:0};
    gs.equip=gs.equip||{weapon:null,armor:null,helm:null,boots:null,ring:null};
    gs.inventory=gs.inventory||[];
    gs.se=gs.se||CLASSES[gs.classKey]?.se||{};
    gs.mainGem=gs.mainGem||"g_cleave";
    gs.supGems=gs.supGems||[null,null,null];
    gs.equippedFlasks=gs.equippedFlasks||[{defId:"fl_life_s"},{defId:"fl_life_s"},null,null,null];
    flaskTimers=Array(FLASK_SLOTS).fill(99999);skillCD=0;activeBuffs=[];
    recalc(gs);
    const ai=Math.min(gs.areaIdx||0,AREAS.length-1);
    const kl=Math.max(1,AREAS[ai].kills-(gs.kills||0));
    gs.enemy=genEnemy(AREAS[ai],kl);
    addLog(`Welcome back, ${CLASSES[gs.classKey].name}! (save restored)`,"area");
    updateAscBtn();renderTab();renderSkillFlaskBar();renderBuffStrip();setSdot("ok");
  }else{
    openOverlay("class");
  }
  raf=requestAnimationFrame(tick);
}
init();
</script>
</body></html>
