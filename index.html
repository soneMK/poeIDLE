<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#090705}
body{color:#e8dac5;font-family:Georgia,serif;font-size:12px;overflow:hidden}

#root{display:flex;flex-direction:column;height:100vh;background:#090705;position:relative}

#hdr h1{font-size:12px;color:#f0b030;letter-spacing:3px;white-space:nowrap}
.hb{display:flex;align-items:center;gap:3px;font-size:10px;white-space:nowrap}

<script>
// ── FORMAT ─────────────────────────────────────────────────────────────────
const SFX=["","K","M","B","T","Qa","Qi","Sx","Sp","Oc","No","Dc","UDc"];
function fmt(n){if(!isFinite(n)||n==null)return"0";if(n<0)return"-"+fmt(-n);if(n<1000)return Math.floor(n)+"";let i=0;while(n>=1000&&i<SFX.length-1){n/=1000;i++;}return(n>=100?Math.floor(n):n>=10?n.toFixed(1):n.toFixed(2))+SFX[i];}

// ── SAVE / LOAD via localStorage ────────────────────────────────────────────
const SAVE_KEY = "poe_idle_v5_local";

function setSdot(st){const d=document.getElementById("sdot");if(d)d.className="sdot"+(st==="ok"?" ok":st==="saving"?" saving":"");}

function saveGame(){
  if(!gs)return;
  setSdot("saving");
  try{
    localStorage.setItem(SAVE_KEY, JSON.stringify({...gs, enemy:null}));
    setSdot("ok");
  }catch(e){
    setSdot("");
    console.warn("Save failed:", e);
  }
}

function loadGame(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw)return null;
    return JSON.parse(raw);
  }catch(e){return null;}
}

let saveTimer=null;
function sched(){clearTimeout(saveTimer);saveTimer=setTimeout(saveGame,3000);}

function confirmReset(){
  if(confirm("Are you sure you want to reset ALL progress? This cannot be undone.")){
    localStorage.removeItem(SAVE_KEY);
    location.reload();
  }
}

    equip:{weapon:null,armor:null,helm:null,boots:null,ring:null},
    inventory:[],se:cls?cls.se:{},
    physMin:5,physMax:12,aspd:1.2,critChance:5,critMulti:150,maxHp:200,hp:200,armor:50,resist:0,leech:0,currMult:1,enemy:null,
  };
}
const cTot=c=>(c.alt||0)*CURRV.alt+(c.alch||0)*CURRV.alch+(c.chaos||0)*CURRV.chaos+(c.exalt||0)*CURRV.exalt;
const upgC=(d,lv)=>Math.floor(d.base*Math.pow(d.mult,lv));
const iScore=it=>{if(!it?.eff)return 0;const e=it.eff;return(e.physPct||0)*3+(e.hpPct||0)*1.5+(e.armPct||0)+(e.aspdPct||0)*2;};
const pick=a=>a[Math.floor(Math.random()*a.length)];
const ri=(a,b)=>Math.floor(a+Math.random()*(b-a+1));

function recalc(s){
  let pp=0,ap=0,hp=0,ar=0,res=0,ll=0,cr=0,cm=0,cuM=1,dmM=1,hpM=1,asM=1,cMx=1;
  const se=s.se||{};
  if(se.physPct)pp+=se.physPct;if(se.aspdPct)ap+=se.aspdPct;if(se.hpPct)hp+=se.hpPct;if(se.crit)cr+=se.crit;if(se.critM)cm+=se.critM;
  for(const id of(s.allocated||[])){const n=PASSIVES.find(x=>x.id===id);if(!n)continue;const e=n.eff;if(e.physPct)pp+=e.physPct;if(e.aspdPct)ap+=e.aspdPct;if(e.hpPct)hp+=e.hpPct;if(e.armPct)ar+=e.armPct;if(e.crit)cr+=e.crit;if(e.critM)cm+=e.critM;if(e.resist)res+=e.resist;if(e.leech)ll+=e.leech;}
  if(s.ascKey&&s.classKey){const cls=CLASSES[s.classKey];if(cls?.asc[s.ascKey]){const asc=cls.asc[s.ascKey];for(const id of(s.ascTaken||[])){const nd=asc.nodes.find(x=>x.id===id);if(!nd)continue;const e=nd.eff;if(e.physPct)pp+=e.physPct;if(e.aspdPct)ap+=e.aspdPct;if(e.hpPct)hp+=e.hpPct;if(e.armPct)ar+=e.armPct;if(e.crit)cr+=e.crit;if(e.critM)cm+=e.critM;if(e.resist)res+=e.resist;if(e.leech)ll+=e.leech;if(e.currMult)cuM*=e.currMult;if(e.critMx)cMx*=e.critMx;}}}
  for(const def of UPGRADES){const lv=s.upgrades[def.id]||0;if(!lv)continue;const e=def.eff;if(e.physPct)pp+=e.physPct*lv;if(e.aspdPct)ap+=e.aspdPct*lv;if(e.hpPct)hp+=e.hpPct*lv;if(e.armPct)ar+=e.armPct*lv;if(e.critM)cm+=e.critM*lv;if(e.currMult)cuM*=(1+e.currMult*lv);}
  for(const it of Object.values(s.equip)){if(!it?.eff)continue;const e=it.eff;if(e.physPct)pp+=e.physPct;if(e.aspdPct)ap+=e.aspdPct;if(e.hpPct)hp+=e.hpPct;if(e.armPct)ar+=e.armPct;if(e.crit)cr+=e.crit;if(e.critM)cm+=e.critM;if(e.resist)res+=e.resist;if(e.leech)ll+=e.leech;if(e.currMult)cuM*=e.currMult;}
  for(const[id,cnt]of Object.entries(s.pUpgrades||{})){if(!cnt)continue;const pd=PUPS.find(x=>x.id===id);if(!pd)continue;const e=pd.eff;if(e.dmgMult)dmM*=Math.pow(e.dmgMult,cnt);if(e.hpMult)hpM*=Math.pow(e.hpMult,cnt);if(e.aspdMult)asM*=Math.pow(e.aspdMult,cnt);if(e.currMult)cuM*=Math.pow(e.currMult,cnt);if(e.allMult){dmM*=Math.pow(e.allMult,cnt);hpM*=Math.pow(e.allMult,cnt);asM*=Math.pow(e.allMult,cnt);}}
  const pM=(1+pp/100)*dmM;
  s.physMin=Math.floor(s.basePhysMin*pM);s.physMax=Math.floor(s.basePhysMax*pM);
  s.aspd=Math.min(s.baseAspd*(1+ap/100)*asM,20);
  s.critChance=Math.min(s.baseCrit+cr,95);s.critMulti=(s.baseCritM+cm)*cMx;
  s.maxHp=Math.floor(s.baseHp*(1+hp/100)*hpM);s.hp=Math.min(s.hp>0?s.hp:s.maxHp,s.maxHp);
  s.armor=Math.floor(s.baseArm*(1+ar/100));s.resist=Math.min(res,90);s.leech=ll;s.currMult=cuM;
  return s;
}

function genEnemy(area,kl){
  const pm=Math.pow(2.5,gs.prestigeLvl||0);
  if(kl<=1)return{name:pick(BPOOL),rarity:"boss",maxHp:area.hp*15*pm,hp:area.hp*15*pm,dmg:area.dmg*4*pm,mods:["BOSS"]};
  const r=Math.random();const rarity=r<.03?"rare":r<.2?"magic":"normal";
  const rH=rarity==="magic"?5:rarity==="rare"?12:1;
  const mods=rarity==="rare"?[pick(["Burning","Frozen","Empowered"]),pick(["Regen","Barrier"])]:rarity==="magic"?[pick(["Burning","Frozen"])]:[];
  const base=pick(EPOOL);
  const name=rarity==="rare"?`${pick(PRE)} ${base} ${pick(SUF)}`:rarity==="magic"?`Mutant ${base}`:base;
  return{name,rarity,maxHp:area.hp*rH*pm,hp:area.hp*rH*pm,dmg:area.dmg*(rarity==="rare"?1.8:rarity==="magic"?1.3:1)*pm,mods};
}
function genItem(tier,rarOvr){
  const mult=1+(gs.prestigeLvl||0)*0.6;
  if(rarOvr==="unique"||Math.random()<.012){const u=pick(UNIQ);const eff={};for(const[k,v]of Object.entries(u.eff))eff[k]=v*mult;return{...u,rarity:"unique",eff};}
  const rarity=rarOvr||(Math.random()<.07?"rare":Math.random()<.25?"magic":"normal");
  const slot=pick(SLOTS);const base=pick(SBASES[slot]);
  const pB=Math.floor((tier*12+ri(10,40))*mult*(rarity==="rare"?1.8:1));
  const hB=Math.floor((tier*15+ri(15,50))*mult*(rarity==="rare"?1.8:1));
  let name,stats=[],eff={};
  if(rarity==="normal"){name=base;}
  else if(rarity==="magic"){name=`${pick(PRE)} ${base}`;if(slot==="weapon"){stats=[`+${pB}% Phys`];eff={physPct:pB};}else if(slot==="armor"||slot==="helm"){stats=[`+${hB}% HP`];eff={hpPct:hB};}else{stats=[`+${Math.floor(pB*.7)}% Phys`];eff={physPct:Math.floor(pB*.7)};}}
  else{name=`${pick(PRE)} ${base} ${pick(SUF)}`;if(slot==="weapon"){const sB=ri(15,35);stats=[`+${pB}% Phys`,`+${sB}% Spd`];eff={physPct:pB,aspdPct:sB};}else if(slot==="armor"||slot==="helm"){const aB=ri(15,40);stats=[`+${hB}% HP`,`+${aB}% Arm`];eff={hpPct:hB,armPct:aB};}else{stats=[`+${Math.floor(pB*.9)}% Phys`,`+${hB}% HP`];eff={physPct:Math.floor(pB*.9),hpPct:hB};}}
  return{name,slot,rarity,stats,eff};
}

function addLog(text,cls="hit"){const d=document.createElement("div");d.className="ll"+(cls==="area"?" area":"");d.style.color=LCOL[cls]||LCOL.hit;d.textContent=text;const l=document.getElementById("log");if(l){l.insertBefore(d,l.firstChild);while(l.children.length>80)l.removeChild(l.lastChild);}}
function showNotif(text,color){const d=document.createElement("div");d.className="notif";d.style.border=`1px solid ${color}`;d.style.color=color;d.textContent=text;const n=document.getElementById("notifarea");if(n)n.appendChild(d);setTimeout(()=>{try{d.remove();}catch(e){}},2200);}
function addFloat(text,color){const fa=document.getElementById("floatarea");const eb=document.getElementById("ebox");if(!fa||!eb)return;const rr=fa.getBoundingClientRect();const er=eb.getBoundingClientRect();const x=er.left-rr.left+er.width/2;const y=er.top-rr.top+14;const d=document.createElement("div");d.className="fdmg";d.style.cssText=`color:${color};left:${x}px;top:${y}px`;d.textContent=text;fa.appendChild(d);setTimeout(()=>{try{d.remove();}catch(e){}},900);}

function tick(ts){
  if(!lastT)lastT=ts;const dt=Math.min(ts-lastT,200);lastT=ts;
  if(!gs?.enemy){raf=requestAnimationFrame(tick);return;}
  combatT+=dt;regenT+=dt;
  if(regenT>=500){regenT-=500;gs.hp=Math.min(gs.maxHp,gs.hp+gs.maxHp*.008);}
  const ai=1000/gs.aspd;
  if(combatT>=ai){
    combatT-=ai;
    const bD=gs.physMin+Math.random()*(gs.physMax-gs.physMin);const isCrit=Math.random()*100<gs.critChance;
    let dmg=Math.max(1,Math.floor(isCrit?bD*(gs.critMulti/100):bD));
    gs.enemy.hp-=dmg;if(gs.leech>0)gs.hp=Math.min(gs.maxHp,gs.hp+dmg*gs.leech/100);
    addFloat(fmt(dmg),isCrit?"#ffcc44":"#c0c0c0");
    if(isCrit)addLog(`CRIT! ${gs.enemy.name} — ${fmt(dmg)}`,"crit");else addLog(`Hit ${gs.enemy.name} for ${fmt(dmg)}`,"hit");
    const mit=Math.min(0.92,gs.armor/(gs.armor+500));const rMit=Math.min(0.75,gs.resist/100);
    const eDmg=Math.max(1,Math.floor(gs.enemy.dmg*(1-mit)*(1-rMit)));
    gs.hp=Math.max(0,gs.hp-eDmg);
    if(gs.enemy.mods.includes("Regen"))gs.enemy.hp=Math.min(gs.enemy.maxHp,gs.enemy.hp+eDmg*.2);
    if(gs.enemy.hp<=0)onKill();else if(gs.hp<=0){gs.hp=Math.floor(gs.maxHp*.25);addLog("Defeated... Resurrected.","level");gs.enemy.hp=gs.enemy.maxHp;}
  }
  updateUI();raf=requestAnimationFrame(tick);
}

function onKill(){
  const area=AREAS[Math.min(gs.areaIdx,AREAS.length-1)];
  gs.kills++;gs.totalKills++;addLog(`Slew ${gs.enemy.name}!`,"kill");
  const eg=Math.floor((15+area.t*8)*(gs.enemy.rarity==="boss"?30:gs.enemy.rarity==="rare"?8:gs.enemy.rarity==="magic"?3:1));
  gs.exp+=eg;
  while(gs.exp>=gs.expNext){gs.exp-=gs.expNext;gs.level++;gs.passivePoints++;gs.baseHp=Math.floor(gs.baseHp*1.08);gs.baseArm=Math.floor(gs.baseArm*1.05);gs.expNext=Math.floor(100*Math.pow(1.22,gs.level-1));addLog(`Level Up! Lv.${gs.level} — Passive point!`,"level");showNotif(`LEVEL UP  Lv.${gs.level}`,"#88aaff");recalc(gs);}
  const ct=CURRD.reduce((a,c)=>a+c.w,0);let cr=Math.random()*ct,cc=0;
  for(const c of CURRD){cc+=c.w;if(cr<cc){if(Math.random()<.4||gs.enemy.rarity!=="normal"){const qty=gs.enemy.rarity==="boss"?ri(3,10):1;const mult=Math.max(1,Math.floor(gs.currMult));const tot=qty*mult;gs.currency[c.id]+=tot;addLog(`${c.name} x${tot}`+(mult>1?` (x${mult})`:""),"currency");}break;}}
  const ir=Math.random();const dr=gs.enemy.rarity==="boss"?(Math.random()<.2?"unique":"rare"):ir<.012?"unique":ir<.08?"rare":ir<.3?"magic":ir<.55?"normal":null;
  if(dr){
    const item=genItem(area.t,dr);const cs=iScore(gs.equip[item.slot]);const ns=iScore(item);
    if(ns>cs){if(gs.equip[item.slot])gs.inventory.push(gs.equip[item.slot]);gs.equip[item.slot]=item;addLog(`Auto-equipped ${item.name}!`,"kill");recalc(gs);}
    else{gs.inventory.push(item);if(gs.inventory.length>20)gs.inventory.shift();}
    if(item.rarity==="unique"){addLog(`UNIQUE FOUND: ${item.name}`,"unique");showNotif(item.name,RCOL.unique);}
    else if(item.rarity!=="normal")addLog(`${item.rarity==="rare"?"★":"◆"} ${item.name}`,"drop");
    if(curTab==="inventory")renderTab();
  }
  if(gs.areaIdx>=AREAS.length-1&&gs.kills>=area.kills){gs.prestigePts++;addLog("Max area looped! +1 Prestige Point!","prestige");showNotif("+1 Prestige Pt","#ee88ee");}
  if(gs.kills>=area.kills){
    gs.kills=0;gs.areaClears=(gs.areaClears||0)+1;
    if(gs.areaClears%10===0){gs.ascPoints=(gs.ascPoints||0)+1;addLog(`Labyrinth cleared! Ascendancy Point granted! (${gs.ascPoints} total)`,"asc");showNotif("ASCENDANCY POINT!","#f0b030");updateAscBtn();}
    const next=Math.min(gs.areaIdx+1,AREAS.length-1);
    if(next!==gs.areaIdx){addLog(`Cleared "${area.name}" — ${AREAS[next].name} T${AREAS[next].t}`,"area");showNotif(`T${AREAS[next].t} ${AREAS[next].name}`,"#c89028");}
    gs.areaIdx=next;gs.enemy=genEnemy(AREAS[next],AREAS[next].kills);
  }else{gs.enemy=genEnemy(area,area.kills-gs.kills);}
  if(gs.hp<=0){gs.hp=Math.floor(gs.maxHp*.25);addLog("Defeated... Resurrected.","level");}
  sched();
}

function updateUI(){
  const area=AREAS[Math.min(gs.areaIdx,AREAS.length-1)];
  const avg=(gs.physMin+gs.physMax)/2;const cMul=1+(gs.critChance/100)*(gs.critMulti/100-1);
  const dps=avg*gs.aspd*cMul;const ct=cTot(gs.currency);
  document.getElementById("hlv").textContent=gs.level;
  document.getElementById("hdps").textContent=fmt(dps)+"/s";
  document.getElementById("hkills").textContent=fmt(gs.totalKills);

  const pb=document.getElementById("pbtn");if(pb)pb.style.display=(gs.prestigePts||0)>0?"block":"none";
  const hpPct=Math.max(0,gs.hp/gs.maxHp*100);

  document.getElementById("hptxt").textContent=`${fmt(Math.floor(gs.hp))}/${fmt(gs.maxHp)}`;

  document.getElementById("sdps").textContent=fmt(dps)+"/s";
  document.getElementById("saspd").textContent=gs.aspd.toFixed(2)+"/s";
  document.getElementById("scrit").textContent=`${gs.critChance.toFixed(0)}%/${gs.critMulti.toFixed(0)}%`;
  document.getElementById("sarm").textContent=fmt(gs.armor);
  document.getElementById("scurr").textContent=fmt(ct);
  document.getElementById("scmult").textContent=`x${(gs.currMult||1).toFixed(1)}`;
  if(gs.classKey){const cls=CLASSES[gs.classKey];const bd=document.getElementById("cbadge");if(bd){bd.style.display="block";bd.style.color=cls.color;bd.style.borderColor=cls.color+"88";bd.style.background=cls.color+"11";bd.textContent=`${cls.ico} ${cls.name}`;}if(gs.ascKey){const asc=cls.asc[gs.ascKey];const ai=document.getElementById("ainfo");if(ai)ai.style.display="block";const an=document.getElementById("aname");if(an){an.textContent=asc.name;an.style.color=asc.color;}const at=document.getElementById("ataken");if(at)at.textContent=gs.ascTaken.length>0?gs.ascTaken.map(id=>asc.nodes.find(n=>n.id===id)?.name||id).join(", "):"No nodes taken yet";}}
  const eq=document.getElementById("eqslots");if(eq){eq.innerHTML="";for(const slot of SLOTS){const it=gs.equip[slot];const d=document.createElement("div");d.className="eqs";d.style.borderColor=it?RCOL[it.rarity]+"77":"#2c2015";d.innerHTML=`<div class="eqsl">${SLOTL[slot]}</div><div class="eqsi" style="color:${it?RCOL[it.rarity]:"#2c2015"}">${it?it.name.slice(0,22)+(it.name.length>22?"...":""):"—"}</div>`;eq.appendChild(d);}}
  const cg=document.getElementById("currgrid");if(cg){cg.innerHTML="";for(const c of CURRD){const d=document.createElement("div");d.className="ci";d.innerHTML=`<div class="cion" style="color:${c.c};border-color:${c.c};background:${c.c}22">${c.s[0]}</div><div><div style="font-size:8px;color:#786855">${c.s}</div><div style="font-size:10px;font-weight:bold;color:#a89878">${fmt(gs.currency[c.id])}</div></div>`;cg.appendChild(d);}}
  document.getElementById("mtbadge").textContent=`T${area.t} MAP`;
  document.getElementById("mpf").style.width=(gs.kills/area.kills*100)+"%";
  document.getElementById("mkc").textContent=gs.kills;document.getElementById("mkt").textContent=area.kills;
  if(gs.enemy){
    const eb=document.getElementById("ebox");eb.className=gs.enemy.rarity==="boss"?"boss":"";
    const ne=document.getElementById("ename");ne.textContent=gs.enemy.name;ne.style.color=RCOL[gs.enemy.rarity]||RCOL.normal;
    document.getElementById("emods").innerHTML=gs.enemy.mods.map(m=>`<span class="emod">${m}</span>`).join("");
    const eH=Math.max(0,gs.enemy.hp/gs.enemy.maxHp*100);
    document.getElementById("ehpf").style.width=eH+"%";
    document.getElementById("ehpt").textContent=`${fmt(Math.max(0,Math.floor(gs.enemy.hp)))} / ${fmt(gs.enemy.maxHp)}`;
  }
}
function updateAscBtn(){const btn=document.getElementById("ascbtn");if(!btn)return;const has=(gs.ascPoints||0)>0;btn.disabled=!has;btn.textContent=has?`ASCENDANCY (${gs.ascPoints}pt)`:"ASCENDANCY (clear 10 areas)";}

function setTab(t){curTab=t;document.querySelectorAll(".tb").forEach((b,i)=>{b.classList.toggle("active",["passive","upgrade","inventory"][i]===t);});renderTab();}
function renderTab(){const el=document.getElementById("tcon");if(!el)return;if(curTab==="passive")renderPassive(el);else if(curTab==="upgrade")renderUpgrade(el);else renderInventory(el);}
function renderPassive(el){const canA=n=>!gs.allocated.includes(n.id)&&gs.passivePoints>0&&(!n.req||n.req.some(r=>gs.allocated.includes(r))||gs.allocated.length===0);let h=`<div style="font-size:11px;color:#786855;margin-bottom:7px">Points: <b style="color:#c89028">${gs.passivePoints}</b></div>`;for(const row of[0,1,2]){const ns=PASSIVES.filter(n=>n.row===row);h+=`<div style="font-size:9px;color:#786855;margin-bottom:2px;font-style:italic">${["Basic","Notable","Keystone"][row]} Nodes</div><div class="pgrid">`;for(const n of ns){const al=gs.allocated.includes(n.id);const av=canA(n);h+=`<div class="pn ${n.ty}${al?" al":av?" av":""}" style="${!al&&!av?"opacity:.35":""}" onclick="allocP('${n.id}')">${n.s.slice(0,6)}<div class="ptt"><b>${n.name}</b>${n.desc}</div></div>`;}h+="</div>";}if(gs.allocated.length>0){h+=`<div class="pt" style="margin-top:4px">Allocated</div>`;for(const id of gs.allocated){const n=PASSIVES.find(x=>x.id===id);if(n)h+=`<div style="font-size:10px;color:#f0b030;padding:1px 0">✦ ${n.name}</div>`;}}el.innerHTML=h;}
function renderUpgrade(el){const ct=cTot(gs.currency);let h=`<div style="font-size:10px;color:#786855;margin-bottom:3px">Total: <b style="color:#c89028">${fmt(ct)}</b></div>`;for(const def of UPGRADES){const lv=gs.upgrades[def.id]||0;const cost=upgC(def,lv);const mx=lv>=def.max;const can=!mx&&ct>=cost;h+=`<div class="uc${can?" can":""}"><div class="uh"><span class="uico">${def.ico}</span><span class="unm">${def.name}</span><span class="ulv">Lv${lv}/${def.max}</span></div><div class="ud">${def.desc}</div><div class="upb"><div class="upbf" style="width:${lv/def.max*100}%"></div></div><button class="ub${mx?" max":can?" buy":""}" onclick="buyUpg('${def.id}')">${mx?"MAXED":fmt(cost)+" curr"}</button></div>`;}el.innerHTML=h;}
function renderInventory(el){let h=`<div style="font-size:10px;color:#786855;margin-bottom:4px">${gs.inventory.length}/20 slots</div>`;if(!gs.inventory.length)h+=`<div style="font-size:11px;color:#786855;font-style:italic;text-align:center;padding:20px 0">No items</div>`;else for(let i=0;i<gs.inventory.length;i++){const it=gs.inventory[i];const col=RCOL[it.rarity]||RCOL.normal;h+=`<div class="iv" style="border-color:${col}77" onclick="equipInv(${i})"><div style="font-size:10px;color:${col}">${it.name}</div><div style="font-size:9px;color:#786855;margin-top:1px">${it.slot} · ${it.stats?.join(" / ")||""}</div><div style="font-size:8px;color:#5a3e10;font-weight:bold;margin-top:2px">▶ Equip</div></div>`;}el.innerHTML=h;}

function allocP(id){const n=PASSIVES.find(x=>x.id===id);if(!n||gs.allocated.includes(id)||gs.passivePoints<=0)return;const ok=!n.req||n.req.some(r=>gs.allocated.includes(r))||gs.allocated.length===0;if(!ok){showNotif("Prerequisite required!","#ff8844");return;}gs.allocated.push(id);gs.passivePoints--;addLog(`Passive "${n.name}" allocated!`,"passive");recalc(gs);renderTab();sched();}
function buyUpg(id){const def=UPGRADES.find(x=>x.id===id);if(!def)return;const lv=gs.upgrades[id]||0;if(lv>=def.max)return;const cost=upgC(def,lv);const ct=cTot(gs.currency);if(ct<cost){showNotif("Not enough currency!","#ff8844");return;}let rem=cost;const cur={...gs.currency};for(const c of[...CURRD].reverse()){const sp=Math.min(cur[c.id],Math.ceil(rem/CURRV[c.id]));cur[c.id]-=sp;rem-=sp*CURRV[c.id];if(rem<=0)break;}gs.currency=cur;gs.upgrades[id]=(gs.upgrades[id]||0)+1;addLog(`${def.name} Lv.${gs.upgrades[id]}`,"upgrade");recalc(gs);renderTab();sched();}
function equipInv(idx){const it=gs.inventory[idx];if(!it)return;const old=gs.equip[it.slot];gs.equip[it.slot]=it;gs.inventory.splice(idx,1);if(old)gs.inventory.unshift(old);if(gs.inventory.length>20)gs.inventory.pop();addLog(`Equipped ${it.name}`,"kill");recalc(gs);renderTab();sched();}

function openOverlay(mode){overlayMode=mode;const ov=document.getElementById("overlay");const ob=document.getElementById("obox");if(!ov||!ob)return;ov.classList.add("show");ov.scrollTop=0;if(mode==="class")renderClassSelect(ob);else if(mode==="asc")renderAscOverlay(ob);else if(mode==="prestige")renderPrestigeOverlay(ob);}
function closeOverlay(){const ov=document.getElementById("overlay");if(ov)ov.classList.remove("show");overlayMode=null;}
function overlayBgClick(e){if(e.target===document.getElementById("overlay"))closeOverlay();}

function renderClassSelect(ob){ob.style.borderColor="#c89028";ob.style.maxWidth="620px";let h=`<h2>CHOOSE YOUR EXILE</h2><div class="osub">Each class has 3 unique Ascendancy paths.</div><div class="cg6">`;for(const[ck,cls]of Object.entries(CLASSES)){const ascList=Object.values(cls.asc).map(a=>`<span style="color:${a.color};font-size:9px">${a.name}</span>`).join(" · ");h+=`<div class="ccard" onclick="selectClass('${ck}')"><div class="ccico">${cls.ico}</div><div class="ccnm" style="color:${cls.color}">${cls.name}</div><div class="cctg">${cls.tag}</div><div class="ccbn">${cls.bonus}</div><div style="margin-top:6px;line-height:1.7">${ascList}</div></div>`;}h+=`</div>`;ob.innerHTML=h;}
function renderAscOverlay(ob){if(!gs?.classKey){ob.innerHTML="<h2>No class</h2>";return;}const cls=CLASSES[gs.classKey];ob.style.borderColor="#c89028";ob.style.maxWidth="560px";if(!gs.ascKey){let h=`<h2>ASCENDANCY — ${cls.name.toUpperCase()}</h2><div class="osub">${gs.ascPoints} point(s) available. Choose your Ascendancy class.</div><div class="ag3">`;for(const[ak,asc]of Object.entries(cls.asc)){h+=`<div class="acard" onclick="chooseAsc('${ak}')" style="border-color:${asc.color}88"><div style="font-size:11px;font-weight:bold;color:${asc.color};margin-bottom:3px">${asc.name}</div><div style="font-size:9px;color:#786855;line-height:1.4">${asc.desc}</div></div>`;}h+=`</div><div class="obtnrow"><button class="osec" onclick="closeOverlay()">Cancel</button></div>`;ob.innerHTML=h;return;}const asc=cls.asc[gs.ascKey];let h=`<h2>${asc.name.toUpperCase()}</h2><div class="osub" style="color:${asc.color}">${asc.desc}</div><div style="font-size:10px;color:#786855;margin-bottom:8px">${gs.ascPoints} point(s) available · ${gs.ascTaken.length} nodes taken</div><div class="ang">`;for(const node of asc.nodes){const taken=gs.ascTaken.includes(node.id);const reqMet=!node.req||node.req.some(r=>gs.ascTaken.includes(r));const canT=!taken&&reqMet&&(gs.ascPoints||0)>=node.cost;h+=`<div class="anc${taken?" taken":!reqMet?" locked":""}" onclick="${canT?`takeAscNode('${node.id}')`:""}" style="border-color:${taken?asc.color:"#2c2015"}"><div class="anname" style="color:${taken?asc.color:"#c89028"}">${node.name}${taken?" ✦":""}</div><div class="antype">${node.t} · ${node.cost}pt</div><div class="andesc">${node.desc}</div></div>`;}h+=`</div><div class="obtnrow"><button class="osec" onclick="gs.ascKey=null;renderAscOverlay(document.getElementById('obox'))">← Change class</button><button class="osec" onclick="closeOverlay()">Close</button></div>`;ob.innerHTML=h;}
function chooseAsc(ak){gs.ascKey=ak;renderAscOverlay(document.getElementById("obox"));sched();}
function takeAscNode(id){const cls=CLASSES[gs.classKey];if(!cls)return;const asc=cls.asc[gs.ascKey];if(!asc)return;const node=asc.nodes.find(x=>x.id===id);if(!node)return;if(gs.ascTaken.includes(id)||(gs.ascPoints||0)<node.cost)return;gs.ascTaken.push(id);gs.ascPoints-=node.cost;addLog(`Ascendancy: "${node.name}" taken!`,"asc");showNotif(node.name,"#f0b030");recalc(gs);updateAscBtn();renderAscOverlay(document.getElementById("obox"));sched();}
function renderPrestigeOverlay(ob){ob.style.borderColor="#ee88ee";ob.style.maxWidth="460px";let h=`<h2 style="color:#ee88ee">PRESTIGE</h2><div class="osub">Reset everything. Grow exponentially stronger.<br>Points: <b style="color:#ee88ee;font-size:13px">${gs.prestigePts}</b></div><div style="font-size:9px;color:#c89028;letter-spacing:2px;border-bottom:1px solid #2c2015;padding-bottom:3px;margin-bottom:8px">PERMANENT UPGRADES</div>`;for(const pd of PUPS){const cnt=(gs.pUpgrades||{})[pd.id]||0;const can=(gs.prestigePts||0)>=pd.cost;h+=`<div class="pug" style="border-color:${can?"#ee88ee44":"#2c2015"}"><span style="font-size:14px">${pd.ico}</span><div style="flex:1"><div style="font-size:10px;color:#ee88ee">${pd.name}${cnt>0?` <b style="color:#f0b030">x${cnt}</b>`:""}</div><div style="font-size:9px;color:#786855">${pd.desc}</div></div><button onclick="buyPU('${pd.id}')" style="padding:2px 8px;font-size:9px;background:${can?"rgba(100,0,110,.4)":"transparent"};border:1px solid ${can?"#ee88ee":"#2c2015"};color:${can?"#ee88ee":"#2c2015"};cursor:${can?"pointer":"default"};font-family:Georgia,serif">${pd.cost}pt</button></div>`;}h+=`<div class="obtnrow"><button class="opri" style="border-color:#ee88ee;color:#ee88ee;background:#1a0820" onclick="doPrestige()">✦ PRESTIGE (1pt)</button><button class="osec" onclick="closeOverlay()">Cancel</button></div>`;ob.innerHTML=h;}
function buyPU(id){const pd=PUPS.find(x=>x.id===id);if(!pd)return;if((gs.prestigePts||0)<pd.cost){showNotif("Not enough points!","#ff8844");return;}gs.pUpgrades=gs.pUpgrades||{};gs.pUpgrades[id]=(gs.pUpgrades[id]||0)+1;gs.prestigePts-=pd.cost;addLog(`Prestige upgrade "${pd.name}"!`,"prestige");recalc(gs);renderPrestigeOverlay(document.getElementById("obox"));sched();}
function doPrestige(){if(!(gs.prestigePts>0)){showNotif("Not enough points!","#ff8844");return;}const newLvl=(gs.prestigeLvl||0)+1;addLog(`PRESTIGE Lv.${newLvl} — Returning stronger!`,"prestige");showNotif(`PRESTIGE Lv.${newLvl}`,"#ee88ee");const saved={prestigeLvl:newLvl,prestigePts:gs.prestigePts-1,pUpgrades:{...gs.pUpgrades},totalKills:gs.totalKills||0};const ck=gs.classKey;gs=Object.assign(makeInit(ck),saved);recalc(gs);gs.enemy=genEnemy(AREAS[0],AREAS[0].kills);closeOverlay();updateAscBtn();setTab("passive");saveGame();}

function selectClass(ck){gs=recalc(makeInit(ck));gs.enemy=genEnemy(AREAS[0],AREAS[0].kills);closeOverlay();updateAscBtn();renderTab();addLog(`${CLASSES[ck].name} chosen. The hunt begins.`,"area");saveGame();}

function init(){
  setSdot("");
  const saved=loadGame();
  if(saved?.classKey&&CLASSES[saved.classKey]){
    gs=saved;
    if(!Array.isArray(gs.allocated))gs.allocated=[];
    if(!Array.isArray(gs.ascTaken))gs.ascTaken=[];
    gs.pUpgrades=gs.pUpgrades||{};
    gs.upgrades=gs.upgrades||{u0:0,u1:0,u2:0,u3:0,u4:0,u5:0,u6:0,u7:0,u8:0,u9:0};
    gs.currency=gs.currency||{alt:0,alch:0,chaos:0,exalt:0};
    gs.equip=gs.equip||{weapon:null,armor:null,helm:null,boots:null,ring:null};
    gs.inventory=gs.inventory||[];
    gs.se=gs.se||CLASSES[gs.classKey]?.se||{};
    recalc(gs);
    const ai=Math.min(gs.areaIdx||0,AREAS.length-1);
    const kl=Math.max(1,AREAS[ai].kills-(gs.kills||0));
    gs.enemy=genEnemy(AREAS[ai],kl);
    addLog(`Welcome back, ${CLASSES[gs.classKey].name}! (save restored)`,"area");
    updateAscBtn();renderTab();setSdot("ok");
  }else{
    openOverlay("class");
  }
  raf=requestAnimationFrame(tick);
}

init();
</script>
</body></html>
