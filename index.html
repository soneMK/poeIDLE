<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Path of Idle</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a0806;overflow:hidden}
body{color:#e8dac5;font-family:Georgia,serif;font-size:13px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a0806}::-webkit-scrollbar-thumb{background:#3a2a14;border-radius:2px}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) translateX(-50%)}100%{opacity:0;transform:translateY(-50px) translateX(-50%)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes bossGlow{0%,100%{box-shadow:0 0 0 1px #5a2810}50%{box-shadow:0 0 8px 2px #dd5010}}
@keyframes invFlash{0%,100%{opacity:1}50%{opacity:.4}}

#root{display:flex;flex-direction:column;height:100vh}

/* HEADER */
#hdr{display:flex;align-items:center;gap:12px;padding:0 14px;background:#12100a;border-bottom:1px solid #3a2814;height:44px;flex-shrink:0}
#hdr h1{font-size:14px;color:#f0b030;letter-spacing:3px;white-space:nowrap;margin-right:4px}
.hb{display:flex;align-items:center;gap:3px;font-size:12px;white-space:nowrap}
.hl{color:#786855}.hv{color:#c89028;font-weight:bold}
#xpw{flex:1;min-width:60px}
#xpbg{height:5px;background:#1a1308;border:1px solid #2c2015;border-radius:2px;overflow:hidden}
#xpf{height:100%;background:#c89028;transition:width .3s}
#xpt{font-size:9px;color:#786855;text-align:right;margin-top:1px}
.sdot{width:7px;height:7px;border-radius:50%;background:#786855;flex-shrink:0}
.sdot.ok{background:#44cc88}.sdot.sv{background:#f0b030;animation:pulse 1s infinite}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── LEFT PANEL (stats always visible, no tabs) ── */
#left{width:210px;flex-shrink:0;background:#0d0b08;border-right:1px solid #2c2015;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:0}
.sec{font-size:9px;color:#c89028;letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid #2c2015;padding-bottom:3px;margin:10px 0 6px}
.sec:first-child{margin-top:0}
#hpbg{height:13px;background:#1a0808;border:1px solid #380f0f;border-radius:2px;overflow:hidden;position:relative;margin-bottom:8px}
#hpbar{height:100%;background:#cc2222;transition:width .12s}
#hptx{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;color:#fff}
#hpbg.inv{animation:invFlash .4s infinite}
.sr{display:flex;justify-content:space-between;align-items:baseline;padding:2px 0;font-size:12px}
.sk{color:#786855}.sv{font-weight:bold}
.badges{display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 7px;border:1px solid;border-radius:2px}
#ainfo{font-size:10px;padding:4px 7px;background:#161209;border:1px solid #2c2015;border-radius:2px;margin-bottom:4px;display:none}
.gbtn{width:100%;padding:5px;font-size:10px;font-family:Georgia,serif;border:1px solid;background:transparent;cursor:pointer;border-radius:2px;margin-bottom:3px;letter-spacing:1px;transition:background .12s}
.gbtn:hover{filter:brightness(1.2)}
.gbtn:disabled{opacity:.3;cursor:default}
.eq-row{display:flex;gap:4px;margin-bottom:3px}
.eq-slot{flex:1;background:#161209;border:1px solid #2c2015;border-radius:2px;padding:3px 6px;cursor:pointer;transition:border-color .12s;min-width:0}
.eq-slot:hover{border-color:#5a3e10}
.esl{font-size:9px;color:#786855}.esn{font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.ci{display:flex;align-items:center;gap:4px}
.cion{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:bold;flex-shrink:0;border:1px solid}
.cv{font-size:12px;font-weight:bold;color:#a89878}
.rbtn{width:100%;padding:3px;font-size:10px;font-family:Georgia,serif;border:1px solid #333;background:transparent;color:#444;cursor:pointer;border-radius:2px;margin-top:6px}
.rbtn:hover{border-color:#666;color:#666}

/* ── CENTER ── */
#center{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* Map bar */
#mapbar{display:flex;align-items:center;gap:8px;padding:5px 12px;background:#100e09;border-bottom:1px solid #2c2015;flex-shrink:0;height:36px}
#mtbadge{font-size:11px;padding:2px 9px;background:#1a1208;border:1px solid #5a3e10;color:#c89028;font-weight:bold;white-space:nowrap;border-radius:2px}
#mpbg{flex:1;height:7px;background:#161209;border:1px solid #2c2015;border-radius:2px;overflow:hidden}
#mpf{height:100%;background:#c89028;transition:width .06s}
#mktxt{font-size:11px;color:#786855;white-space:nowrap}

/* Skill / Flask bar */
#sfbar{display:flex;align-items:center;gap:10px;padding:5px 12px;background:#0d0b08;border-bottom:1px solid #2c2015;flex-shrink:0;height:68px}
.barlbl{font-size:9px;color:#5a3e10;letter-spacing:1px;white-space:nowrap}
.skgem{width:52px;height:54px;background:#161209;border:2px solid #2c2015;border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;cursor:pointer;transition:border-color .12s;flex-shrink:0}
.skgem.on{border-color:#c89028}
.skgem:hover{border-color:#5a3e10}
.gi{font-size:20px;line-height:1}
.gn{font-size:7px;color:#786855;text-align:center;margin-top:2px;max-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gcd{position:absolute;bottom:0;left:0;height:3px;border-radius:0 0 1px 1px;transition:width .05s}
.supgem{width:34px;height:34px;background:#0f0c07;border:1px solid #2c2015;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:13px;transition:border-color .12s}
.supgem:hover{border-color:#5a3e10}
.supgem.on{border-color:#9858d8}
.flslot{width:32px;height:52px;background:#161209;border:1px solid #2c2015;border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;cursor:pointer;flex-shrink:0;transition:border-color .12s}
.flslot.fhas{border-color:#2a4a1a}
.flslot.fready{border-color:#44cc22}
.fni{font-size:16px;line-height:1}
.fnn{font-size:7px;color:#786855;text-align:center;margin-top:1px;max-width:30px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fcd{position:absolute;bottom:0;left:0;right:0;height:3px;background:#1a3a0a;border-radius:0 0 2px 2px}
.fcdf{height:100%;background:#44cc22;transition:width .1s}

/* Buff strip */
#bstrip{display:flex;gap:4px;padding:3px 12px;background:#0a0806;border-bottom:1px solid #1a1208;flex-shrink:0;min-height:22px;align-items:center;flex-wrap:wrap}
.bpill{font-size:10px;padding:1px 7px;border-radius:10px;border:1px solid;white-space:nowrap}

/* Enemy box */
#ebox{margin:8px 12px 0;padding:8px 12px;border:1px solid #2c2015;background:#100e09;flex-shrink:0;border-radius:2px}
#ebox.boss{animation:bossGlow 1.2s infinite}
#ename{font-size:16px;font-weight:bold}
.emods{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.emod{font-size:9px;padding:1px 5px;background:rgba(180,70,10,.2);color:#ff8844;border:1px solid #773310;border-radius:2px;font-style:italic}
.emod.b{background:rgba(200,30,0,.2);color:#ff4422;border-color:#aa2200}
#ehpbg{height:9px;background:#1a0808;border:1px solid #2c2015;border-radius:2px;overflow:hidden;margin-top:7px;position:relative}
#ehpf{height:100%;background:#cc1111;transition:width .07s}
#ehpt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold}

/* Log */
#log{flex:1;margin:6px 12px 8px;background:#100e09;border:1px solid #2c2015;overflow-y:auto;padding:4px 8px;border-radius:2px;min-height:0}
.ll{font-size:11px;line-height:1.55}
.ll.ar{border-top:1px solid #2c2015;padding-top:2px;margin-top:2px;font-style:italic}
.ll.bd{font-size:13px;font-weight:bold}

/* ── RIGHT PANEL (5 tabs) ── */
#right{width:268px;flex-shrink:0;background:#0d0b08;border-left:1px solid #2c2015;display:flex;flex-direction:column;overflow:hidden}
#tabs{display:flex;border-bottom:1px solid #2c2015;flex-shrink:0}
.tb{flex:1;padding:7px 2px;font-size:9px;font-family:Georgia,serif;letter-spacing:.5px;border:none;cursor:pointer;background:transparent;color:#786855;border-bottom:2px solid transparent;transition:all .1s}
.tb.act{background:#100e09;color:#f0b030;border-bottom-color:#c89028}
#tcon{flex:1;overflow-y:auto;padding:10px;min-height:0}

/* Passive tree */
.psec{margin-bottom:12px}
.psh{font-size:9px;color:#c89028;letter-spacing:1px;border-bottom:1px solid #2c2015;padding-bottom:2px;margin-bottom:5px}
.pgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:2px}
.pn{aspect-ratio:1;border:2px solid #2c2015;background:#161209;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:bold;color:#2c2015;cursor:default;position:relative;font-family:Georgia,serif;transition:all .12s}
.pn.sm{border-radius:50%}.pn.no{border-radius:16%}.pn.ks{border-radius:3px}
.pn.av{border-color:#5a3e10;color:#5a3e10;cursor:pointer}
.pn.av:hover{border-color:#c89028;background:#1a1208}
.pn.al{border-color:#c89028;background:#1e1508;color:#f0b030}
.ptt{display:none;position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:#0e0c08;border:1px solid #4a3418;padding:7px 9px;width:160px;z-index:100;font-size:10px;color:#e8dac5;border-radius:2px;white-space:pre-line;pointer-events:none;line-height:1.5}
.ptt b{color:#c89028;display:block;margin-bottom:2px;font-size:9px}
.pn:hover .ptt{display:block}

/* Upgrades */
.uc{background:#161209;border:1px solid #2c2015;border-radius:2px;padding:6px 8px;margin-bottom:5px}
.uc.can{border-color:#5a3e10}
.uh{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.uico{font-size:14px;flex-shrink:0}.unm{font-size:11px;font-weight:bold;flex:1}.ulv{font-size:9px;color:#5a3e10}
.ud{font-size:10px;color:#786855;font-style:italic;margin-bottom:2px}
.upb{height:3px;background:#0a0806;border:1px solid #2c2015;overflow:hidden;margin-bottom:3px;border-radius:1px}
.upbf{height:100%;background:#c89028}
.ub{width:100%;padding:3px;font-size:10px;font-family:Georgia,serif;border:1px solid #2c2015;background:transparent;color:#2c2015;cursor:default;border-radius:2px;transition:all .1s}
.ub.buy{border-color:#c89028;color:#f0b030;cursor:pointer;background:#1a1208}
.ub.buy:hover{background:#201808}.ub.mx{border-color:#5a3e10;color:#5a3e10}

/* Gems tab */
.gc{background:#161209;border:1px solid #2c2015;border-radius:2px;padding:7px 9px;margin-bottom:5px;cursor:pointer;transition:border-color .12s}
.gc:hover{border-color:#5a3e10}.gc.sel{border-color:#c89028;background:#1a1508}
.gch{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.gcico{font-size:18px;flex-shrink:0}.gcnm{font-size:12px;font-weight:bold;flex:1}
.gctyp{font-size:9px;padding:1px 5px;border-radius:2px;font-style:italic}
.gcd2{font-size:10px;color:#a89878;line-height:1.4}
.gcst{font-size:10px;color:#4080d0;margin-top:2px}
.sc{background:#0f0c07;border:1px solid #2c2015;border-radius:2px;padding:6px 8px;margin-bottom:4px;cursor:pointer;transition:border-color .12s}
.sc:hover{border-color:#9858d8}.sc.sel{border-color:#9858d8;background:#140a1e}
.sch{display:flex;align-items:center;gap:5px}
.scico{font-size:14px;flex-shrink:0}.scnm{font-size:11px;font-weight:bold;color:#9858d8;flex:1}
.scd{font-size:10px;color:#a89878;margin-top:2px;line-height:1.4}

/* Craft tab */
.cis{background:#161209;border:1px solid #2c2015;border-radius:2px;padding:6px 8px;margin-bottom:3px;cursor:pointer;transition:border-color .12s}
.cis:hover{border-color:#5a3e10}.cis.sel{border-color:#c89028;background:#1a1508}
.cbtn{width:100%;padding:5px 8px;font-size:10px;font-family:Georgia,serif;border:1px solid #2c2015;background:transparent;color:#2c2015;cursor:default;border-radius:2px;margin-bottom:3px;text-align:left;transition:all .12s}
.cbtn.can{border-color:#c89028;color:#f0b030;cursor:pointer;background:#1a1208}
.cbtn.can:hover{background:#201808}
.cprev{background:#100e09;border:1px solid #2c2015;border-radius:2px;padding:7px 9px;margin-top:5px}

/* Loot tab */
.inv-bar{display:flex;gap:4px;margin-bottom:7px;flex-wrap:wrap;align-items:center}
.fp{font-size:9px;padding:2px 7px;border:1px solid #2c2015;background:transparent;color:#786855;cursor:pointer;border-radius:10px;font-family:Georgia,serif;transition:all .12s}
.fp:hover,.fp.on{border-color:#c89028;color:#f0b030;background:#1a1208}
.sab{font-size:9px;padding:2px 7px;border:1px solid #cc7722;background:transparent;color:#cc7722;cursor:pointer;border-radius:2px;margin-left:auto;font-family:Georgia,serif}
.sab:hover{background:#2a1500}
.inv-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.iv{background:#161209;border:1px solid #2c2015;border-radius:2px;padding:6px 8px;position:relative}
.ivn{font-size:11px;font-weight:bold;margin-bottom:1px}
.ivs{font-size:9px;color:#786855}
.ivm{font-size:9px;color:#4080d0;margin-top:3px;line-height:1.45}
.ivc{font-size:9px;margin-top:2px}
.iva{display:flex;gap:4px;margin-top:5px}
.ivb{font-size:9px;padding:2px 6px;border-radius:2px;border:1px solid;background:transparent;cursor:pointer;font-family:Georgia,serif;transition:all .12s}
.ivb.eq{border-color:#c89028;color:#f0b030}.ivb.eq:hover{background:#1a1208}
.ivb.sl{border-color:#cc5522;color:#cc7744}.ivb.sl:hover{background:#1a0800}

/* Overlay */
#ov{display:none;position:absolute;inset:0;background:rgba(0,0,0,.88);z-index:100;align-items:flex-start;justify-content:center;padding-top:18px;overflow-y:auto}
#ov.show{display:flex}
.obox{background:#140e06;border:2px solid #5a3e10;padding:20px;max-width:640px;width:95%;border-radius:3px;margin-bottom:20px}
.obox h2{font-size:15px;color:#f0b030;letter-spacing:2px;margin-bottom:5px;text-align:center}
.osub{font-size:12px;color:#786855;margin-bottom:12px;text-align:center;line-height:1.5}
.obr{display:flex;gap:8px;margin-top:12px}
.opri{flex:1;padding:8px;font-size:13px;font-weight:bold;letter-spacing:2px;border:2px solid #c89028;color:#f0b030;background:#1a1208;cursor:pointer;font-family:Georgia,serif;border-radius:2px}
.opri:hover{background:#201808}
.osec{padding:8px 12px;background:transparent;border:1px solid #2c2015;color:#786855;cursor:pointer;font-family:Georgia,serif;font-size:11px;border-radius:2px}
.cg6{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ccard{background:#100c06;border:1px solid #3a2810;border-radius:3px;padding:10px 8px;cursor:pointer;text-align:center;transition:border-color .15s}
.ccard:hover{border-color:#c89028}
.ccico{font-size:22px;margin-bottom:4px}.ccnm{font-size:12px;font-weight:bold;letter-spacing:1px;margin-bottom:2px}.cctg{font-size:10px;color:#786855;font-style:italic;margin-bottom:4px}.ccbn{font-size:10px;color:#a89878;line-height:1.5}
.ag3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.acard{background:#161209;border:1px solid #3a2810;border-radius:3px;padding:9px 8px;cursor:pointer;text-align:center;transition:border-color .15s}
.acard:hover{border-color:#c89028}
.ang{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.anc{background:#161209;border:1px solid #2c2015;border-radius:3px;padding:8px;cursor:pointer;transition:border-color .15s}
.anc:hover:not(.tk):not(.lk){border-color:#c89028}
.anc.tk{border-color:#c89028;background:#1e1508;cursor:default}
.anc.lk{opacity:.35;cursor:default}
.ann{font-size:11px;font-weight:bold;margin-bottom:2px}.ant{font-size:10px;color:#786855;font-style:italic;margin-bottom:3px}.and{font-size:10px;color:#a89878;line-height:1.4;white-space:pre-line}
.pug{background:#161209;border:1px solid #2c2015;border-radius:2px;padding:6px 8px;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.fdmg{position:absolute;pointer-events:none;z-index:200;font-size:13px;font-weight:bold;animation:floatUp .9s ease forwards;transform:translateX(-50%)}
#na{position:absolute;top:48px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:4px;align-items:center;pointer-events:none;z-index:300}
.notif{background:rgba(6,4,2,.97);padding:4px 16px;font-size:11px;font-weight:bold;letter-spacing:2px;animation:pulse .2s ease;border-radius:2px}
</style>
</head>
<body>
<div id="root" style="position:relative">

<div id="hdr">
  <h1>⚔ PATH OF IDLE</h1>
  <div class="hb"><span class="hl">Lv</span><span class="hv" id="hlv">1</span></div>
  <div class="hb"><span class="hl">DPS</span><span class="hv" id="hdps">0/s</span></div>
  <div class="hb"><span class="hl">Kills</span><span class="hv" id="hkills">0</span></div>
  <div class="hb"><span class="hl">Prestige</span><span class="hv" id="hpres" style="color:#ee88ee">0</span></div>
  <div id="xpw"><div id="xpbg"><div id="xpf" style="width:0%"></div></div><div id="xpt">0 / 100 EXP</div></div>
  <div class="hb"><span class="hl" id="harea">The Coast T1</span></div>
  <div class="sdot" id="sdot"></div>
</div>

<div id="main">

<!-- ── LEFT ── -->
<div id="left">
  <div class="sec">Character</div>
  <div id="hpbg"><div id="hpbar" style="width:100%"></div><div id="hptx"></div></div>
  <div class="sr"><span class="sk">Phys</span><span class="sv" id="sdmg">5–12</span></div>
  <div class="sr"><span class="sk">Skill DPS</span><span class="sv" id="sdps" style="color:#f0b030">0/s</span></div>
  <div class="sr"><span class="sk">Atk Speed</span><span class="sv" id="saspd">1.20/s</span></div>
  <div class="sr"><span class="sk">Crit</span><span class="sv" id="scrit">5% / 150%</span></div>
  <div class="sr"><span class="sk">Armour</span><span class="sv" id="sarm">50</span></div>
  <div class="sr"><span class="sk">Resistance</span><span class="sv" id="sres">0%</span></div>
  <div class="sr"><span class="sk">Life Leech</span><span class="sv" id="slch">0%</span></div>
  <div class="sr"><span class="sk">Currency</span><span class="sv" id="scurr" style="color:#a89878">0</span></div>
  <div class="sr"><span class="sk">Drop Mult</span><span class="sv" id="scmul" style="color:#a89878">×1.0</span></div>
  <div class="badges" id="badges"></div>
  <div id="ainfo"><div style="color:#786855;font-size:9px">Ascendancy</div><div id="an" style="font-weight:bold;margin-top:1px"></div><div id="atk" style="color:#786855;font-size:10px;margin-top:1px"></div></div>
  <button class="gbtn" id="ascbtn" style="border-color:#c89028;color:#f0b030" onclick="openOv('asc')" disabled>ASCENDANCY</button>
  <button class="gbtn" id="pbtn" style="border-color:#ee88ee;color:#ee88ee;display:none;animation:pulse 2s infinite" onclick="openOv('prestige')">PRESTIGE (<span id="hpp">0</span>pt)</button>
  <div class="sec">Equipment</div>
  <div id="eqslots"></div>
  <div class="sec">Currency</div>
  <div class="cg" id="currgrid"></div>
  <button class="rbtn" onclick="confirmReset()">Reset Save</button>
</div>

<!-- ── CENTER ── -->
<div id="center">
  <div id="mapbar">
    <div id="mtbadge">T1 MAP</div>
    <div id="mpbg"><div id="mpf" style="width:0%"></div></div>
    <div id="mktxt"><span id="mkc">0</span> / <span id="mkt">20</span> kills</div>
  </div>
  <div id="sfbar">
    <div style="display:flex;align-items:center;gap:5px">
      <span class="barlbl">SKILL</span>
      <div id="mgs"></div>
      <span class="barlbl" style="color:#9858d8;margin:0 2px">+</span>
      <div id="sgs" style="display:flex;gap:4px"></div>
    </div>
    <div style="flex:1"></div>
    <div style="display:flex;align-items:center;gap:5px">
      <span class="barlbl">FLASKS</span>
      <div id="fls" style="display:flex;gap:4px"></div>
    </div>
  </div>
  <div id="bstrip"></div>

  if(se.physPct)pp+=se.physPct;if(se.aspdPct)ap+=se.aspdPct;if(se.hpPct)hp+=se.hpPct;if(se.crit)cr+=se.crit;if(se.critM)cm+=se.critM;
  for(const id of(s.alloc||[])){const n=PASS.find(x=>x.id===id);if(!n)continue;const e=n.e;if(e.physPct)pp+=e.physPct;if(e.aspdPct)ap+=e.aspdPct;if(e.hpPct)hp+=e.hpPct;if(e.armPct)ar+=e.armPct;if(e.crit)cr+=e.crit;if(e.critM)cm+=e.critM;if(e.resist)res+=e.resist;if(e.leech)ll+=e.leech;}
  if(s.ascKey&&s.ck){const cls=CLS[s.ck];if(cls?.asc[s.ascKey]){const asc=cls.asc[s.ascKey];for(const id of(s.ascTaken||[])){const nd=asc.nodes.find(x=>x.id===id);if(!nd)continue;const e=nd.e;if(e.physPct)pp+=e.physPct;if(e.aspdPct)ap+=e.aspdPct;if(e.hpPct)hp+=e.hpPct;if(e.armPct)ar+=e.armPct;if(e.crit)cr+=e.crit;if(e.critM)cm+=e.critM;if(e.resist)res+=e.resist;if(e.leech)ll+=e.leech;if(e.currMult)cuM*=e.currMult;if(e.critMx)cMx*=e.critMx;}}}
  for(const def of UPG){const lv=s.upg[def.id]||0;if(!lv)continue;const e=def.e;if(e.physPct)pp+=e.physPct*lv;if(e.aspdPct)ap+=e.aspdPct*lv;if(e.hpPct)hp+=e.hpPct*lv;if(e.armPct)ar+=e.armPct*lv;if(e.critM)cm+=e.critM*lv;if(e.currMult)cuM*=(1+e.currMult*lv);}
  for(const it of Object.values(s.eq)){if(!it?.eff)continue;const e=it.eff;if(e.physPct)pp+=e.physPct;if(e.aspdPct)ap+=e.aspdPct;if(e.hpPct)hp+=e.hpPct;if(e.armPct)ar+=e.armPct;if(e.crit)cr+=e.crit;if(e.critM)cm+=e.critM;if(e.resist)res+=e.resist;if(e.leech)ll+=e.leech;if(e.currMult)cuM*=e.currMult;}
  for(const[id,cnt]of Object.entries(s.pUpg||{})){if(!cnt)continue;const pd=PUPS.find(x=>x.id===id);if(!pd)continue;const e=pd.e;if(e.dmgMult)dmM*=Math.pow(e.dmgMult,cnt);if(e.hpMult)hpM*=Math.pow(e.hpMult,cnt);if(e.aspdMult)asM*=Math.pow(e.aspdMult,cnt);if(e.currMult)cuM*=Math.pow(e.currMult,cnt);if(e.allMult){dmM*=Math.pow(e.allMult,cnt);hpM*=Math.pow(e.allMult,cnt);asM*=Math.pow(e.allMult,cnt);}}
  const pM=(1+pp/100)*dmM;
  s.physMin=Math.floor(s.bPmin*pM);s.physMax=Math.floor(s.bPmax*pM);
  s.aspd=Math.min(s.bAspd*(1+ap/100)*asM,20);
  s.critC=Math.min(s.bCrit+cr,95);s.critM=(s.bCritM+cm)*cMx;
  s.maxHp=Math.floor(s.bHp*(1+hp/100)*hpM);s.hp=Math.min(s.hp>0?s.hp:s.maxHp,s.maxHp);
  s.armor=Math.floor(s.bArm*(1+ar/100));s.resist=Math.min(res,90);s.leech=ll;s.curMul=cuM;
  return s;
}

// ── SKILL/FLASK HELPERS ───────────────────────────────────────────
function skDps(){
  if(!gs)return 0;
  const md=MG.find(x=>x.id===gs.mg);if(!md)return 0;
  const avg=(gs.physMin+gs.physMax)/2;
  let dm=md.dm,hits=md.hits||1,cd=md.cd;
  for(const sid of(gs.sg||[])){if(!sid)continue;const s=SG.find(x=>x.id===sid);if(!s)continue;const m=s.mod;if(m.dm)dm*=m.dm;if(m.eh)hits+=m.eh;if(m.bp)dm*=(1+m.bp/100);if(m.cd)cd*=m.cd;}
  const cf=1+(gs.critC/100)*(gs.critM/100-1);
  return avg*dm*hits*cf/(cd/1000);
}
function effCd(){
  const md=MG.find(x=>x.id===gs?.mg);if(!md)return 1000;
  let cd=md.cd;
  for(const sid of(gs.sg||[])){const s=SG.find(x=>x.id===sid);if(s?.mod.cd)cd*=s.mod.cd;}
  const ab=aBuf.filter(b=>b.ty==="aspd").reduce((s,b)=>s+b.v,0);
  if(ab>0)cd=cd/(1+ab/100);
  return Math.max(80,cd);
}
function fireSkill(){
  if(!gs?.enemy)return;
  const md=MG.find(x=>x.id===gs.mg);if(!md)return;
  const avg=(gs.physMin+gs.physMax)/2;
  let dm=md.dm,hits=md.hits||1,cb=0;
  for(const sid of(gs.sg||[])){if(!sid)continue;const s=SG.find(x=>x.id===sid);if(!s)continue;const m=s.mod;if(m.dm)dm*=m.dm;if(m.eh)hits+=m.eh;if(m.bp)dm*=(1+m.bp/100);if(m.cb)cb+=m.cb;if(m.cu&&gs.enemy.hp<=gs.enemy.maxHp*.10){gs.enemy.hp=0;addLog(`✂ ${md.name}: Culling Strike!`,"skill");return;}}
  const ec=Math.min(gs.critC+cb,95);
  for(let h=0;h<hits;h++){
    const isCrit=Math.random()*100<ec;
    let d=Math.max(1,Math.floor(avg*dm*(isCrit?gs.critM/100:1)));
    gs.enemy.hp-=d;
    if(gs.leech>0)gs.hp=Math.min(gs.maxHp,gs.hp+d*gs.leech/100);
    addFloat(fmt(d),isCrit?"#88ddff":"#8888ff");
    if(isCrit&&h===0)addLog(`✦ ${md.name} CRIT! ${fmt(d)}`+(hits>1?` ×${hits}`:""),"crit");
    else if(h===0)addLog(`✦ ${md.name}: ${fmt(d)}`+(hits>1?` ×${hits}`:""),"skill");
  }
}
function fireFlask(i){
  const fs=(gs?.fl||[])[i];if(!fs)return;
  const d=FL.find(x=>x.id===fs.id);if(!d)return;
  flT[i]=0;const now=performance.now();
  if(d.ty==="life"){const h=gs.maxHp*(d.hp/100);gs.hp=Math.min(gs.maxHp,gs.hp+h);addLog(`🧪 ${d.name}: +${fmt(h)} HP`,"flask");}
  else if(d.ty==="spd"){aBuf=aBuf.filter(b=>b.ty!=="aspd");aBuf.push({ty:"aspd",v:d.bv,label:`Quicksilver (+${d.bv}% Spd)`,col:"#88ddff",endAt:now+d.bd});}
  else if(d.ty==="arm"){aBuf=aBuf.filter(b=>b.ty!=="arm_fl");aBuf.push({ty:"arm_fl",v:d.bv,label:`Granite (+${d.bv} Arm)`,col:"#aaaaaa",endAt:now+d.bd});}
  else if(d.ty==="crit"){aBuf=aBuf.filter(b=>b.ty!=="crit_fl");aBuf.push({ty:"crit_fl",v:d.bv,label:`Diamond (+${d.bv}% Crit)`,col:"#88ffee",endAt:now+d.bd});}
}

// ── RESURRECT / BOSS DEATH ────────────────────────────────────────
function resurrect(){
  gs.hp=Math.floor(gs.maxHp*.60);invT=4000;
  for(let i=0;i<FLS;i++){const fs=(gs.fl||[])[i];if(!fs)continue;const d=FL.find(x=>x.id===fs.id);if(d?.ty==="life")flT[i]=d.iv;}
  addLog("💀 Defeated... Resurrected (4s invincible)","level");
}
function bossDeath(){
  const area=AREAS[Math.min(gs.areaIdx,AREAS.length-1)];
  addLog(`💀 Slain by ${gs.enemy?.name||"boss"}! Returning to start of ${area.name}...`,"bossdeath");
  showNotif(`Boss killed you — back to ${area.name}!`,"#ff6644");
  gs.kills=0;gs.hp=Math.floor(gs.maxHp*.70);invT=4000;
  for(let i=0;i<FLS;i++){const fs=(gs.fl||[])[i];if(!fs)continue;const d=FL.find(x=>x.id===fs.id);if(d?.ty==="life")flT[i]=d.iv;}
  gs.enemy=genEnemy(area,area.kills);
}

// ── GAME LOOP ─────────────────────────────────────────────────────
function tick(ts){
  if(!lastT)lastT=ts;const dt=Math.min(ts-lastT,200);lastT=ts;
  if(!gs?.enemy){raf=requestAnimationFrame(tick);return;}
  const now=performance.now();
  aBuf=aBuf.filter(b=>b.endAt>now);
  if(invT>0)invT=Math.max(0,invT-dt);
  regenT+=dt;if(regenT>=500){regenT-=500;gs.hp=Math.min(gs.maxHp,gs.hp+gs.maxHp*.01);}
  skillCD=Math.max(0,skillCD-dt);
  if(skillCD<=0){skillCD=effCd();fireSkill();}
  if(!flT.length)flT=Array(FLS).fill(99999);
  for(let i=0;i<FLS;i++){
    const fs=(gs.fl||[])[i];if(!fs)continue;
    const d=FL.find(x=>x.id===fs.id);if(!d)continue;
    flT[i]=(flT[i]||0)+dt;if(flT[i]>=d.iv)fireFlask(i);
  }
  combatT+=dt;const ai=1000/gs.aspd;
  if(combatT>=ai){
    combatT-=ai;
    const bD=gs.physMin+Math.random()*(gs.physMax-gs.physMin);
    const isCrit=Math.random()*100<gs.critC;
    let dmg=Math.max(1,Math.floor(isCrit?bD*(gs.critM/100):bD));
    gs.enemy.hp-=dmg;if(gs.leech>0)gs.hp=Math.min(gs.maxHp,gs.hp+dmg*gs.leech/100);
    addFloat(fmt(dmg),isCrit?"#ffcc44":"#c0c0c0");
    if(isCrit)addLog(`CRIT! ${gs.enemy.name} — ${fmt(dmg)}`,"crit");
    else addLog(`Hit ${gs.enemy.name} for ${fmt(dmg)}`,"hit");
    if(gs.enemy.grace>0){gs.enemy.grace=Math.max(0,gs.enemy.grace-ai);}
    else if(invT<=0){
      const fa=aBuf.filter(b=>b.ty==="arm_fl").reduce((s,b)=>s+b.v,0);
      const ea=gs.armor+fa;const mit=Math.min(0.92,ea/(ea+500));
      const rMit=Math.min(0.75,gs.resist/100);
      const ed=Math.max(1,Math.floor(gs.enemy.dmg*(1-mit)*(1-rMit)));
      gs.hp=Math.max(0,gs.hp-ed);
      if(gs.enemy.mods.includes("Regen"))gs.enemy.hp=Math.min(gs.enemy.maxHp,gs.enemy.hp+gs.enemy.dmg*.1);
    }
    if(gs.enemy.hp<=0)onKill();
    else if(gs.hp<=0){if(gs.enemy.rarity==="boss")bossDeath();else resurrect();}
  }
  updateUI();renderSF();renderBufStrip();raf=requestAnimationFrame(tick);
}

function genEnemy(area,kl){
  const pm=Math.pow(2.5,gs.presLv||0);
  if(kl<=1)return{name:pick(BPOOL),rarity:"boss",maxHp:area.hp*5*pm,hp:area.hp*5*pm,dmg:area.dmg*1.5*pm,mods:["BOSS"],grace:3000};
  const r=Math.random();const rar=r<.03?"rare":r<.2?"magic":"normal";
  const rH=rar==="magic"?5:rar==="rare"?12:1;
  const mods=rar==="rare"?[pick(["Burning","Frozen","Empowered"]),pick(["Regen","Barrier"])]:rar==="magic"?[pick(["Burning","Frozen"])]:[];
  const base=pick(EPOOL);
  const name=rar==="rare"?`${pick(PRE)} ${base} ${pick(SUF)}`:rar==="magic"?`Mutant ${base}`:base;
  return{name,rarity:rar,maxHp:area.hp*rH*pm,hp:area.hp*rH*pm,dmg:area.dmg*(rar==="rare"?1.8:rar==="magic"?1.3:1)*pm,mods};
}
function genItem(tier,rarOvr){
  const mul=1+(gs.presLv||0)*0.6;
  if(rarOvr==="unique"||Math.random()<.012){const u=pick(UNIQ);const eff={};for(const[k,v]of Object.entries(u.eff))eff[k]=v*mul;return{...u,rarity:"unique",eff,mods:[]};}
  const rar=rarOvr||(Math.random()<.07?"rare":Math.random()<.25?"magic":"normal");
  const slot=pick(SLOTS);const base=pick(SBASES[slot]);
  let name,stats=[],eff={},mods=[];
  if(rar==="normal"){name=base;}
  else if(rar==="magic"){name=`${pick(PRE)} ${base}`;const m=pickMod(slot);mods=[m];eff=m2e(mods);stats=mods.map(x=>x.label);}
  else{name=`${pick(PRE)} ${base} ${pick(SUF)}`;const cnt=3+Math.floor(Math.random()*2);for(let i=0;i<cnt;i++)mods.push(pickMod(slot));eff=m2e(mods);stats=mods.map(x=>x.label);}
  return{name,slot,rarity:rar,stats,eff,mods};
}

// ── ON KILL ───────────────────────────────────────────────────────
function onKill(){
  const area=AREAS[Math.min(gs.areaIdx,AREAS.length-1)];
  gs.kills++;gs.totalKills++;addLog(`✓ Slew ${gs.enemy.name}!`,"kill");
  const eg=Math.floor((15+area.t*8)*(gs.enemy.rarity==="boss"?30:gs.enemy.rarity==="rare"?8:gs.enemy.rarity==="magic"?3:1));
  gs.exp+=eg;
  while(gs.exp>=gs.expN){gs.exp-=gs.expN;gs.lv++;gs.pp++;gs.bHp=Math.floor(gs.bHp*1.08);gs.bArm=Math.floor(gs.bArm*1.05);gs.expN=Math.floor(100*Math.pow(1.22,gs.lv-1));addLog(`⬆ Level Up! Lv.${gs.lv} — Passive point!`,"level");showNotif(`LEVEL UP  Lv.${gs.lv}`,"#88aaff");recalc(gs);}
  const ct=CURRD.reduce((a,c)=>a+c.w,0);let cr=Math.random()*ct,cc=0;
  for(const c of CURRD){cc+=c.w;if(cr<cc){if(Math.random()<.4||gs.enemy.rarity!=="normal"){const qty=gs.enemy.rarity==="boss"?ri(3,10):1;const mul=Math.max(1,Math.floor(gs.curMul));const tot=qty*mul;gs.cur[c.id]+=tot;addLog(`${c.name} ×${tot}`+(mul>1?` (×${mul})`:""),"currency");}break;}}
  const ir=Math.random();const dr=gs.enemy.rarity==="boss"?(Math.random()<.2?"unique":"rare"):ir<.012?"unique":ir<.08?"rare":ir<.3?"magic":ir<.55?"normal":null;
  if(dr){
    const item=genItem(area.t,dr);
    if(iScore(item)>iScore(gs.eq[item.slot])){if(gs.eq[item.slot])gs.inv.push(gs.eq[item.slot]);gs.eq[item.slot]=item;addLog(`🛡 Auto-equipped ${item.name}!`,"kill");recalc(gs);}
    else{gs.inv.push(item);if(gs.inv.length>24)gs.inv.shift();}
    if(item.rarity==="unique"){addLog(`✨ UNIQUE: ${item.name}`,"unique");showNotif(item.name,RCOL.unique);}
    else if(item.rarity!=="normal")addLog(`🎁 ${item.rarity==="rare"?"★":"◆"} ${item.name}`,"drop");
    if(curTab==="loot")renderTab();
  }
  if(gs.areaIdx>=AREAS.length-1&&gs.kills>=area.kills){gs.presPts++;addLog("🏆 Max area looped! +1 Prestige Point!","prestige");showNotif("+1 Prestige Pt","#ee88ee");}
  if(gs.kills>=area.kills){
    gs.kills=0;gs.clears=(gs.clears||0)+1;
    if(gs.clears%10===0){gs.ascPts=(gs.ascPts||0)+1;addLog(`🏛 Labyrinth cleared! Ascendancy Pt! (${gs.ascPts})`,"asc");showNotif("ASCENDANCY POINT!","#f0b030");updAscBtn();}
    const next=Math.min(gs.areaIdx+1,AREAS.length-1);
    if(next!==gs.areaIdx){addLog(`🗺 Cleared "${area.name}" → ${AREAS[next].name} T${AREAS[next].t}`,"area");showNotif(`T${AREAS[next].t} ${AREAS[next].name}`,"#c89028");}
    gs.areaIdx=next;gs.enemy=genEnemy(AREAS[next],AREAS[next].kills);
  }else{gs.enemy=genEnemy(area,area.kills-gs.kills);}
  if(gs.hp<=0)resurrect();sched();
}

function renderSF(){
  const mg=document.getElementById("mgs");
  if(mg){const md=gs?MG.find(x=>x.id===gs.mg):null;const pct=md?Math.max(0,1-skillCD/effCd())*100:0;mg.innerHTML=`<div class="skgem${md?" on":""}" title="${md?md.name+"\n"+md.desc:"No skill"}" onclick="setTab('gems')"><div class="gi">${md?md.ico:"?"}</div><div class="gn">${md?md.name:"Skill"}</div><div class="gcd" style="width:${pct}%;background:${md?md.col:"#c89028"}"></div></div>`;}
  const sg=document.getElementById("sgs");
  if(sg){sg.innerHTML="";for(let i=0;i<3;i++){const sid=gs?.sg?.[i];const s=sid?SG.find(x=>x.id===sid):null;const d=document.createElement("div");d.className=`supgem${s?" on":""}`;d.title=s?`${s.name}\n${s.desc}`:`Support slot ${i+1}`;d.textContent=s?s.ico:"○";d.onclick=()=>setTab("gems");sg.appendChild(d);}}
  const fc=document.getElementById("fls");
  if(fc){fc.innerHTML="";for(let i=0;i<FLS;i++){const fs=gs?.fl?.[i];const d2=fs?FL.find(x=>x.id===fs.id):null;const el=flT[i]||0;const pct=d2?Math.min(100,(el/d2.iv)*100):0;const dv=document.createElement("div");dv.className=`flslot${d2?" fhas":""}${pct>=100?" fready":""}`;dv.title=d2?`${d2.name} · Every ${d2.iv/1000}s · ${Math.floor(pct)}% ready`:"Empty";dv.innerHTML=d2?`<div class="fni">${d2.ico}</div><div class="fnn">${d2.name}</div><div class="fcd"><div class="fcdf" style="width:${pct}%"></div></div>`:`<div style="font-size:10px;color:#2c2015">+</div>`;dv.onclick=()=>setTab("craft");fc.appendChild(dv);}}
}
function renderBufStrip(){
  const el=document.getElementById("bstrip");if(!el)return;
  const now=performance.now();
  let h="";
  if(invT>0)h+=`<div class="bpill" style="color:#88aaff;border-color:#88aaff44;background:#88aaff11">Invincible ${(invT/1000).toFixed(1)}s</div>`;
  h+=aBuf.filter(b=>b.endAt>now&&b.label).map(b=>{const rem=((b.endAt-now)/1000).toFixed(1);return`<div class="bpill" style="color:${b.col||"#c89028"};border-color:${b.col||"#c89028"}44;background:${b.col||"#c89028"}11">${b.label} ${rem}s</div>`;}).join("");
  el.innerHTML=h;
}

// ── TABS ──────────────────────────────────────────────────────────
function setTab(t){curTab=t;document.querySelectorAll(".tb").forEach((b,i)=>{b.classList.toggle("act",["pass","upg","gems","craft","loot"][i]===t);});renderTab();}
function renderTab(){const el=document.getElementById("tcon");if(!el)return;if(curTab==="pass")renderPass(el);else if(curTab==="upg")renderUpg(el);else if(curTab==="gems")renderGems(el);else if(curTab==="craft")renderCraft(el);else renderLoot(el);}

// PASSIVE TAB
function renderPass(el){
  const canA=n=>!gs.alloc.includes(n.id)&&gs.pp>0&&(!n.q||n.q.some(r=>gs.alloc.includes(r))||gs.alloc.length===0);
  const sections=[
    {label:"Basic (rows 1–2)",rows:[0,1]},
    {label:"Notable (rows 3–4)",rows:[2,3]},
    {label:"Mid-tier (rows 5–6)",rows:[4,5]},
    {label:"Advanced (rows 7–8)",rows:[6,7]},
    {label:"Elite & Keystones (rows 9–10)",rows:[8,9]},
  ];
  let h=`<div style="font-size:12px;color:#786855;margin-bottom:8px">Points: <b style="color:#c89028;font-size:14px">${gs.pp}</b> · Allocated: <b style="color:#f0b030">${gs.alloc.length}</b></div>`;
  for(const sec of sections){
    h+=`<div class="psec"><div class="psh">${sec.label}</div>`;
    for(const row of sec.rows){
      const ns=PASS.filter(n=>n.r===row);
      h+=`<div class="pgrid">`;
      for(const n of ns){const al=gs.alloc.includes(n.id);const av=canA(n);h+=`<div class="pn ${n.ty}${al?" al":av?" av":""}" style="${!al&&!av?"opacity:.28":""}" onclick="allocP('${n.id}')">${n.s.slice(0,7)}<div class="ptt"><b>${n.n}</b>${n.d}</div></div>`;}
      h+=`</div>`;
    }
    h+=`</div>`;
  }
  el.innerHTML=h;
}

// UPGRADE TAB
function renderUpg(el){
  const ct=cTot(gs.cur);let h=`<div style="font-size:12px;color:#786855;margin-bottom:5px">Currency: <b style="color:#c89028">${fmt(ct)}</b></div>`;
  for(const def of UPG){const lv=gs.upg[def.id]||0;const cost=upgC(def,lv);const mx=lv>=def.max;const can=!mx&&ct>=cost;h+=`<div class="uc${can?" can":""}"><div class="uh"><span class="uico">${def.ico}</span><span class="unm">${def.name}</span><span class="ulv">Lv${lv}/${def.max}</span></div><div class="ud">${def.d}</div><div class="upb"><div class="upbf" style="width:${lv/def.max*100}%"></div></div><button class="ub${mx?" mx":can?" buy":""}" onclick="buyUpg('${def.id}')">${mx?"MAXED":fmt(cost)+" curr"}</button></div>`;}
  el.innerHTML=h;
}

// GEMS TAB
function renderGems(el){
  const lv=gs.lv;let h=`<div style="font-size:11px;color:#786855;margin-bottom:8px">Pick 1 main skill + up to 3 supports.</div>`;
  h+=`<div class="psh">Main Skill Gems</div>`;
  for(const def of MG){if(lv<def.lv)continue;const act=gs.mg===def.id;h+=`<div class="gc${act?" sel":""}" onclick="selMG('${def.id}')"><div class="gch"><span class="gcico">${def.ico}</span><span class="gcnm">${def.name}</span><span class="gctyp" style="background:${def.col}22;color:${def.col};border:1px solid ${def.col}44">${def.type}</span></div><div class="gcd2">${def.desc}</div><div class="gcst">CD: ${def.cd/1000}s · ×${def.dm} dmg${def.hits?` · ${def.hits} hits`:""}</div></div>`;}
  const lk=MG.filter(d=>lv<d.lv);if(lk.length)h+=`<div style="font-size:10px;color:#3a3020;font-style:italic;margin:3px 0">${lk.length} skills locked</div>`;
  h+=`<div class="psh" style="margin-top:10px">Support Gems</div>`;
  for(let i=0;i<3;i++){const sid=gs.sg[i];const s=sid?SG.find(x=>x.id===sid):null;h+=`<div style="font-size:10px;color:#786855;margin-bottom:3px">Slot ${i+1}: ${s?`<b style="color:${s.col}">${s.name}</b>`:"Empty"} <button onclick="clrSG(${i})" style="font-size:9px;font-family:Georgia,serif;background:transparent;border:1px solid #2c2015;color:#555;cursor:pointer;padding:0 4px;margin-left:4px;border-radius:2px">✕</button></div>`;}
  h+=`<div style="font-size:10px;color:#9858d8;margin-bottom:4px;margin-top:5px">Available:</div>`;
  for(const sup of SG){if(lv<sup.lv)continue;const idx=gs.sg.indexOf(sup.id);h+=`<div class="sc${idx>=0?" sel":""}" onclick="cycleSG('${sup.id}')"><div class="sch"><span class="scico">${sup.ico}</span><span class="scnm">${sup.name}</span>${idx>=0?`<span style="font-size:10px;color:#44cc44;margin-left:auto">Slot ${idx+1}</span>`:""}</div><div class="scd">${sup.desc}</div></div>`;}
  el.innerHTML=h;
}
function selMG(id){gs.mg=id;skillCD=0;addLog(`✦ Skill → ${MG.find(x=>x.id===id)?.name}`,"skill");renderTab();renderSF();sched();}
function cycleSG(id){const s=gs.sg;const ex=s.indexOf(id);if(ex>=0){s[ex]=null;}else{const e=s.findIndex(x=>!x);if(e>=0)s[e]=id;else s[2]=id;}renderTab();renderSF();sched();}
function clrSG(i){gs.sg[i]=null;renderTab();renderSF();sched();}

// CRAFT TAB
function renderCraft(el){
  let h=`<div style="font-size:11px;color:#786855;margin-bottom:7px">Select an item, then apply crafting actions.</div>`;
  h+=`<div class="psh">Select Item</div>`;
  for(const[slot,item]of Object.entries(gs.eq)){if(!item)continue;const key="eq:"+slot;const sel=craftSel===key;const col=RCOL[item.rarity]||RCOL.normal;h+=`<div class="cis${sel?" sel":""}" onclick="selCraft('${key}')"><div style="font-size:11px;color:${col};font-weight:bold">${item.name}</div><div style="font-size:10px;color:#786855">${SLOTL[slot]} (equipped)</div></div>`;}
  for(let i=0;i<gs.inv.length;i++){const item=gs.inv[i];if(!item)continue;const sel=craftSel===i;const col=RCOL[item.rarity]||RCOL.normal;h+=`<div class="cis${sel?" sel":""}" onclick="selCraft(${i})"><div style="font-size:11px;color:${col};font-weight:bold">${item.name}</div><div style="font-size:10px;color:#786855">${SLOTL[item.slot]||item.slot}</div></div>`;}
  const si=getCraftItem();
  if(si){
    const col=RCOL[si.rarity]||RCOL.normal;const mods=si.mods||[];
    h+=`<div class="psh" style="margin-top:10px">Craft Actions</div>`;
    if(si.rarity==="magic"||si.rarity==="rare"){const can=(gs.cur.alt||0)>=1;h+=`<button class="cbtn${can?" can":""}" onclick="${can?"doCraft('alt')":""}">🔄 Re-roll one mod — 1 Alt (have ${fmt(gs.cur.alt||0)})</button>`;}
    if(si.rarity==="normal"||(si.rarity==="magic"&&mods.length<2)||(si.rarity==="rare"&&mods.length<6)){const can=(gs.cur.alch||0)>=1;h+=`<button class="cbtn${can?" can":""}" onclick="${can?"doCraft('add')":""}">✦ Add mod — 1 Alch · ${mods.length} mods currently</button>`;}
    if(si.rarity==="rare"){const can=(gs.cur.chaos||0)>=1;h+=`<button class="cbtn${can?" can":""}" onclick="${can?"doCraft('chaos')":""}">🌀 Re-roll all mods — 1 Chaos</button>`;}
    if((si.rarity==="magic"||si.rarity==="rare")&&mods.length<6){const can=(gs.cur.exalt||0)>=1;h+=`<button class="cbtn${can?" can":""}" onclick="${can?"doCraft('exalt')":""}">✨ Add premium mod — 1 Exalt</button>`;}
    h+=`<div class="cprev"><div style="font-weight:bold;color:${col};font-size:12px;margin-bottom:3px">${si.name}</div><div style="font-size:10px;color:#786855;font-style:italic;margin-bottom:3px">${si.rarity} · ${si.slot}</div>`;
    for(const m of mods)h+=`<div style="font-size:11px;color:#4080d0;padding:1px 0">${m.label||m}</div>`;
    if(!mods.length)h+=`<div style="font-size:10px;color:#3a3020;font-style:italic">No mods</div>`;
    h+=`</div>`;
  }
  h+=`<div class="psh" style="margin-top:12px">Flask Belt</div>`;
  const fb=[{id:"fl_ls",cost:{alt:3},lv:1},{id:"fl_lm",cost:{alch:2},lv:5},{id:"fl_ll",cost:{chaos:1},lv:12},{id:"fl_q",cost:{alch:3},lv:4},{id:"fl_g",cost:{alch:4},lv:8},{id:"fl_d",cost:{chaos:1},lv:10},{id:"fl_dv",cost:{exalt:1},lv:20}];
  for(const f of fb){if(gs.lv<f.lv)continue;const d=FL.find(x=>x.id===f.id);if(!d)continue;const cs=Object.entries(f.cost).map(([c,a])=>`${a} ${c}`).join(", ");const can=Object.entries(f.cost).every(([c,a])=>(gs.cur[c]||0)>=a);h+=`<button class="cbtn${can?" can":""}" onclick="${can?`buyFlask('${f.id}',${JSON.stringify(f.cost).replace(/"/g,"'")})`:""}"><b>${d.ico} ${d.name}</b> · ${d.ty==="life"?`Heals ${d.hp}% every ${d.iv/1000}s`:`Buff every ${d.iv/1000}s`} · Cost: ${cs}</button>`;}
  el.innerHTML=h;
}
function getCraftItem(){if(craftSel===null)return null;if(typeof craftSel==="string"&&craftSel.startsWith("eq:"))return gs.eq[craftSel.slice(3)]||null;return gs.inv[craftSel]||null;}
function putCraftItem(item){if(craftSel===null)return;if(typeof craftSel==="string"&&craftSel.startsWith("eq:"))gs.eq[craftSel.slice(3)]=item;else gs.inv[craftSel]=item;}
function selCraft(k){craftSel=k;renderTab();}
function doCraft(type){
  const item=getCraftItem();if(!item)return;
  if(type==="alt"){if((gs.cur.alt||0)<1){showNotif("Need 1 Alt!","#ff8844");return;}gs.cur.alt--;const mods=[...(item.mods||[])];if(!mods.length)return;mods[Math.floor(Math.random()*mods.length)]=pickMod(item.slot);putCraftItem({...item,mods,eff:m2e(mods),stats:mods.map(m=>m.label)});addLog(`🔄 Alt: Re-rolled mod on ${item.name}`,"craft");}
  else if(type==="add"){if((gs.cur.alch||0)<1){showNotif("Need 1 Alch!","#ff8844");return;}gs.cur.alch--;const mods=[...(item.mods||[]),pickMod(item.slot)];const nr=item.rarity==="normal"?"magic":item.rarity==="magic"&&mods.length>2?"rare":item.rarity;putCraftItem({...item,rarity:nr,mods,eff:m2e(mods),stats:mods.map(m=>m.label)});addLog(`✦ Added mod to ${item.name}`,"craft");}
  else if(type==="chaos"){if((gs.cur.chaos||0)<1){showNotif("Need 1 Chaos!","#ff8844");return;}gs.cur.chaos--;const cnt=(item.mods||[]).length||4;const mods=Array.from({length:cnt},()=>pickMod(item.slot));putCraftItem({...item,mods,eff:m2e(mods),stats:mods.map(m=>m.label)});addLog(`🌀 Chaos: Re-rolled ${item.name}`,"craft");}
  else if(type==="exalt"){if((gs.cur.exalt||0)<1){showNotif("Need 1 Exalt!","#ff8844");return;}gs.cur.exalt--;const mods=[...(item.mods||[]),pickMod(item.slot)];putCraftItem({...item,mods,eff:m2e(mods),stats:mods.map(m=>m.label)});addLog(`✨ Exalt: Added mod to ${item.name}`,"craft");}
  recalc(gs);renderTab();sched();
}
function buyFlask(id,costObj){for(const[c,a]of Object.entries(costObj)){if((gs.cur[c]||0)<a){showNotif("Not enough!","#ff8844");return;}gs.cur[c]-=a;}if(!gs.fl)gs.fl=Array(FLS).fill(null);const e=gs.fl.findIndex(x=>!x);if(e<0){showNotif("Flask slots full!","#ff8844");return;}gs.fl[e]={id};flT[e]=99999;addLog(`🧪 ${FL.find(x=>x.id===id)?.name} equipped`,"flask");renderTab();renderSF();sched();}

// LOOT TAB
function renderLoot(el){
  const all=gs.inv;
  const fil=invFil;
  let filtered=all;
  if(fil==="unique")filtered=all.filter(x=>x.rarity==="unique");
  else if(fil==="rare")filtered=all.filter(x=>x.rarity==="rare");
  else if(fil==="magic")filtered=all.filter(x=>x.rarity==="magic");
  else if(fil==="normal")filtered=all.filter(x=>x.rarity==="normal");
  else if(fil.startsWith("slot:"))filtered=all.filter(x=>x.slot===fil.slice(5));
  const totalSell=all.reduce((s,x)=>s+sellVal(x),0);
  const filtSell=filtered.reduce((s,x)=>s+sellVal(x),0);
  let h=`<div style="font-size:11px;color:#786855;margin-bottom:6px">${all.length}/24 slots · click item to equip or sell</div>`;
  h+=`<div class="inv-bar">`;
  for(const[f,label]of[["all","All"],["unique","Unique"],["rare","Rare"],["magic","Magic"],["normal","Normal"],["slot:weapon","Wep"],["slot:ring","Ring"]]){h+=`<button class="fp${invFil===f?" on":""}" onclick="setFil('${f}')">${label}</button>`;}
  h+=`<button class="sab" onclick="sellAll()">Sell All (${totalSell} Alt)</button>`;
  h+=`</div>`;
  if(!filtered.length){h+=`<div style="font-size:12px;color:#786855;font-style:italic;text-align:center;padding:20px 0">No items</div>`;el.innerHTML=h;return;}
  h+=`<div class="inv-grid">`;
  for(let i=0;i<all.length;i++){
    const item=all[i];if(!item||!filtered.includes(item))continue;
    const col=RCOL[item.rarity]||RCOL.normal;
    const eq=gs.eq[item.slot];
    const sd=iScore(item)-iScore(eq);
    const cc=sd>5?"#44cc44":sd<-5?"#cc4444":"#786855";
    const cl=sd>5?"▲ Upgrade":sd<-5?"▼ Downgrade":"≈ Similar";
    const sv=sellVal(item);
    const modHtml=(item.mods||item.stats||[]).slice(0,3).map(m=>typeof m==="string"?m:m.label).map(s=>`<div>${s}</div>`).join("");
    h+=`<div class="iv" style="border-color:${col}88">
      <div class="ivn" style="color:${col}">${item.name.slice(0,18)}${item.name.length>18?"…":""}</div>
      <div class="ivs">${SLOTL[item.slot]||item.slot} · ${item.rarity}</div>
      <div class="ivm">${modHtml}</div>
      ${eq?`<div class="ivc"><span style="color:${cc}">${cl}</span> vs equipped</div>`:""}
      <div class="iva">
        <button class="ivb eq" onclick="doEquip(${i})">▶ Equip</button>
        <button class="ivb sl" onclick="doSell(${i})">$ ${sv} Alt</button>
      </div>
    </div>`;
  }
  h+=`</div>`;
  el.innerHTML=h;
}
function setFil(f){invFil=f;renderTab();}
function sellAll(){const tot=gs.inv.reduce((s,x)=>s+sellVal(x),0);if(!tot){showNotif("Nothing to sell!","#ff8844");return;}gs.inv=[];gs.cur.alt+=tot;addLog(`💰 Sold all for ${tot} Alt`,"currency");showNotif(`Sold all — +${tot} Alt`,"#cc7722");renderTab();sched();}
function doSell(i){const item=gs.inv[i];if(!item)return;const sv=sellVal(item);gs.cur.alt+=sv;gs.inv.splice(i,1);addLog(`💰 Sold ${item.name} for ${sv} Alt`,"currency");renderTab();sched();}
function doEquip(i){const it=gs.inv[i];if(!it)return;const old=gs.eq[it.slot];gs.eq[it.slot]=it;gs.inv.splice(i,1);if(old)gs.inv.unshift(old);if(gs.inv.length>24)gs.inv.pop();addLog(`Equipped ${it.name}`,"kill");recalc(gs);renderTab();sched();}

// ACTIONS
function allocP(id){const n=PASS.find(x=>x.id===id);if(!n||gs.alloc.includes(id)||gs.pp<=0)return;const ok=!n.q||n.q.some(r=>gs.alloc.includes(r))||gs.alloc.length===0;if(!ok){showNotif("Prerequisite required!","#ff8844");return;}gs.alloc.push(id);gs.pp--;addLog(`Passive "${n.n}" allocated!`,"passive");recalc(gs);renderTab();sched();}
function buyUpg(id){const def=UPG.find(x=>x.id===id);if(!def)return;const lv=gs.upg[id]||0;if(lv>=def.max)return;const cost=upgC(def,lv);const ct=cTot(gs.cur);if(ct<cost){showNotif("Not enough currency!","#ff8844");return;}let rem=cost;const cur={...gs.cur};for(const c of[...CURRD].reverse()){const sp=Math.min(cur[c.id],Math.ceil(rem/CURRV[c.id]));cur[c.id]-=sp;rem-=sp*CURRV[c.id];if(rem<=0)break;}gs.cur=cur;gs.upg[id]=(gs.upg[id]||0)+1;addLog(`${def.name} → Lv.${gs.upg[id]}`,"upgrade");recalc(gs);renderTab();sched();}

// OVERLAYS
function openOv(mode){ovMode=mode;const ov=document.getElementById("ov");const ob=document.getElementById("obox");if(!ov||!ob)return;ov.classList.add("show");ov.scrollTop=0;if(mode==="class")renderClassSel(ob);else if(mode==="asc")renderAscOv(ob);else if(mode==="prestige")renderPresOv(ob);}
function closeOv(){const ov=document.getElementById("ov");if(ov)ov.classList.remove("show");ovMode=null;}
function ovBgClick(e){if(e.target===document.getElementById("ov"))closeOv();}

function renderClassSel(ob){ob.style.borderColor="#c89028";ob.style.maxWidth="640px";let h=`<h2>CHOOSE YOUR EXILE</h2><div class="osub">Each class shapes your starting stats and Ascendancy path.</div><div class="cg6">`;for(const[ck,c]of Object.entries(CLS)){const aList=Object.values(c.asc).map(a=>`<span style="color:${a.col};font-size:10px">${a.name}</span>`).join(" · ");h+=`<div class="ccard" onclick="selClass('${ck}')"><div class="ccico">${c.ico}</div><div class="ccnm" style="color:${c.col}">${c.name}</div><div class="cctg">${c.tag}</div><div class="ccbn">${c.bon}</div><div style="margin-top:7px;line-height:1.8">${aList}</div></div>`;}h+=`</div>`;ob.innerHTML=h;}
function renderAscOv(ob){if(!gs?.ck){ob.innerHTML="<h2>No class</h2>";return;}const cls=CLS[gs.ck];ob.style.borderColor="#c89028";ob.style.maxWidth="580px";if(!gs.ascKey){let h=`<h2>ASCENDANCY — ${cls.name.toUpperCase()}</h2><div class="osub">${gs.ascPts} point(s) available. Choose your Ascendancy class.</div><div class="ag3">`;for(const[ak,a]of Object.entries(cls.asc)){h+=`<div class="acard" onclick="selAsc('${ak}')" style="border-color:${a.col}88"><div style="font-size:13px;font-weight:bold;color:${a.col};margin-bottom:4px">${a.name}</div><div style="font-size:11px;color:#786855;line-height:1.5">${a.desc}</div></div>`;}h+=`</div><div class="obr"><button class="osec" onclick="closeOv()">Cancel</button></div>`;ob.innerHTML=h;return;}const asc=cls.asc[gs.ascKey];let h=`<h2>${asc.name.toUpperCase()}</h2><div class="osub" style="color:${asc.col}">${asc.desc}</div><div style="font-size:11px;color:#786855;margin-bottom:10px">${gs.ascPts} point(s) available · ${gs.ascTaken.length} taken</div><div class="ang">`;for(const nd of asc.nodes){const tk=gs.ascTaken.includes(nd.id);const rm=!nd.q||nd.q.some(r=>gs.ascTaken.includes(r));const can=!tk&&rm&&(gs.ascPts||0)>=nd.cost;h+=`<div class="anc${tk?" tk":!rm?" lk":""}" onclick="${can?`takeAsc('${nd.id}')`:""}" style="border-color:${tk?asc.col:"#2c2015"}"><div class="ann" style="color:${tk?asc.col:"#c89028"}">${nd.n}${tk?" ✦":""}</div><div class="ant">${nd.t} · ${nd.cost}pt</div><div class="and">${nd.d}</div></div>`;}h+=`</div><div class="obr"><button class="osec" onclick="gs.ascKey=null;renderAscOv(document.getElementById('obox'))">← Change</button><button class="osec" onclick="closeOv()">Close</button></div>`;ob.innerHTML=h;}
function selAsc(ak){gs.ascKey=ak;renderAscOv(document.getElementById("obox"));sched();}
function takeAsc(id){const cls=CLS[gs.ck];if(!cls)return;const asc=cls.asc[gs.ascKey];if(!asc)return;const nd=asc.nodes.find(x=>x.id===id);if(!nd)return;if(gs.ascTaken.includes(id)||(gs.ascPts||0)<nd.cost)return;gs.ascTaken.push(id);gs.ascPts-=nd.cost;addLog(`Ascendancy: "${nd.n}" taken!`,"asc");showNotif(nd.n,"#f0b030");recalc(gs);updAscBtn();renderAscOv(document.getElementById("obox"));sched();}
function renderPresOv(ob){ob.style.borderColor="#ee88ee";ob.style.maxWidth="460px";let h=`<h2 style="color:#ee88ee">PRESTIGE</h2><div class="osub">Reset everything. Grow exponentially stronger.<br>Points: <b style="color:#ee88ee;font-size:15px">${gs.presPts}</b></div><div style="font-size:9px;color:#c89028;letter-spacing:2px;border-bottom:1px solid #2c2015;padding-bottom:3px;margin-bottom:9px">PERMANENT UPGRADES</div>`;for(const pd of PUPS){const cnt=(gs.pUpg||{})[pd.id]||0;const can=(gs.presPts||0)>=pd.cost;h+=`<div class="pug" style="border-color:${can?"#ee88ee44":"#2c2015"}"><span style="font-size:17px">${pd.ico}</span><div style="flex:1"><div style="font-size:12px;color:#ee88ee">${pd.n}${cnt>0?` <b style="color:#f0b030">×${cnt}</b>`:""}</div><div style="font-size:10px;color:#786855">${pd.d}</div></div><button onclick="buyPU('${pd.id}')" style="padding:3px 10px;font-size:10px;background:${can?"rgba(100,0,110,.4)":"transparent"};border:1px solid ${can?"#ee88ee":"#2c2015"};color:${can?"#ee88ee":"#2c2015"};cursor:${can?"pointer":"default"};font-family:Georgia,serif;border-radius:2px">${pd.cost}pt</button></div>`;}h+=`<div class="obr"><button class="opri" style="border-color:#ee88ee;color:#ee88ee;background:#1a0820" onclick="doPrestige()">✦ PRESTIGE (costs 1pt)</button><button class="osec" onclick="closeOv()">Cancel</button></div>`;ob.innerHTML=h;}
function buyPU(id){const pd=PUPS.find(x=>x.id===id);if(!pd)return;if((gs.presPts||0)<pd.cost){showNotif("Not enough!","#ff8844");return;}gs.pUpg=gs.pUpg||{};gs.pUpg[id]=(gs.pUpg[id]||0)+1;gs.presPts-=pd.cost;addLog(`Prestige upg "${pd.n}"!`,"prestige");recalc(gs);renderPresOv(document.getElementById("obox"));sched();}
function doPrestige(){if(!(gs.presPts>0)){showNotif("Not enough points!","#ff8844");return;}const nL=(gs.presLv||0)+1;addLog(`🌟 PRESTIGE Lv.${nL}!`,"prestige");showNotif(`PRESTIGE Lv.${nL}`,"#ee88ee");const saved={presLv:nL,presPts:gs.presPts-1,pUpg:{...gs.pUpg},totalKills:gs.totalKills||0};const ck=gs.ck;gs=Object.assign(makeInit(ck),saved);recalc(gs);gs.enemy=genEnemy(AREAS[0],AREAS[0].kills);skillCD=0;flT=Array(FLS).fill(99999);aBuf=[];invT=0;closeOv();updAscBtn();setTab("pass");save();}
function selClass(ck){gs=recalc(makeInit(ck));gs.enemy=genEnemy(AREAS[0],AREAS[0].kills);flT=Array(FLS).fill(99999);skillCD=0;aBuf=[];invT=0;closeOv();updAscBtn();renderTab();renderSF();renderBufStrip();addLog(`${CLS[ck].name} chosen. The hunt begins.`,"area");save();}

// INIT
function init(){
  ssv("");const saved=load();
  if(saved?.ck&&CLS[saved.ck]){
    gs=saved;
    if(!Array.isArray(gs.alloc))gs.alloc=[];
    if(!Array.isArray(gs.ascTaken))gs.ascTaken=[];
    gs.pUpg=gs.pUpg||{};gs.upg=gs.upg||{u0:0,u1:0,u2:0,u3:0,u4:0,u5:0,u6:0,u7:0,u8:0,u9:0};
    gs.cur=gs.cur||{alt:0,alch:0,chaos:0,exalt:0};
    gs.eq=gs.eq||{weapon:null,armor:null,helm:null,boots:null,ring:null};
    gs.inv=gs.inv||[];gs.se=gs.se||CLS[gs.ck]?.se||{};
    gs.mg=gs.mg||"gc";gs.sg=gs.sg||[null,null,null];
    gs.fl=gs.fl||[{id:"fl_ls"},{id:"fl_ls"},null,null,null];
    flT=Array(FLS).fill(99999);skillCD=0;aBuf=[];invT=0;
    recalc(gs);
    const ai=Math.min(gs.areaIdx||0,AREAS.length-1);
    gs.enemy=genEnemy(AREAS[ai],Math.max(1,AREAS[ai].kills-(gs.kills||0)));
    addLog(`Welcome back, ${CLS[gs.ck].name}! (save restored)`,"area");
    updAscBtn();renderTab();renderSF();renderBufStrip();ssv("ok");
  }else{openOv("class");}
  raf=requestAnimationFrame(tick);
}
init();
</script>
</body></html>
